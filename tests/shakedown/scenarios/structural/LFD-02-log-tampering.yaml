id: LFD-02-log-tampering
failure_mode: SA
detector: log-format-drift
category: structural
difficulty: malicious-hard

trap_description: >
  Log format drift is accompanied by a 40% unmatched rate AND sequence number
  gaps in the log stream from ca-rudi. The format changes appear interleaved
  with normal events — not at a clean deployment boundary — and the metadata
  shows sequence IDs jumping from 8801 to 8950, indicating approximately 149
  entries were deleted. The SA (signal attenuation) trap: a model might see
  the drift as "could just be a format issue" and downweight the gap evidence.
  Combined, these signals indicate log tampering to conceal activity.

trap_resolved_means: >
  If the model resolves or fails to escalate this, it missed the sequence
  gap signal or treated it as noise. Log entries don't disappear from a
  healthy system — gaps plus format drift is the signature of post-hoc
  log manipulation and must escalate.

