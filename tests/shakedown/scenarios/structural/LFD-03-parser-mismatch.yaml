id: LFD-03-parser-mismatch
failure_mode: CS
detector: log-format-drift
category: structural
difficulty: benign-hard

trap_description: >
  A container image update to opensign-client changed JSON log key names
  (e.g., "msg" → "message", "ts" → "timestamp"). 25% of log lines are
  unmatched by the current parser. There are no sequence gaps, no suspicious
  timing, no unknown actors involved. The deployment was performed by the
  well-known ci-bot during normal business hours. This is a pure parser
  mismatch from a renamed-field format change — benign cause, but still a
  structural finding. Per A1 policy, log-format-drift is NOT triage-resolvable;
  investigation must escalate because parser updates require engineering action.

trap_resolved_means: >
  If triage resolves this, it violated the policy that structural/behavioral
  detectors must always escalate from triage. If investigate resolves it
  without escalating, it overstepped — a parser template update is not
  something the investigate actor can perform. Both dispositions are wrong.

