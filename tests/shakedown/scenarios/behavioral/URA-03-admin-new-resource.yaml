id: URA-03-admin-new-resource
failure_mode: AE
detector: unusual-resource-access
category: behavioral
difficulty: malicious-hard

trap_description: >
  Deeply known actor admin-user (300+ events, extensive relationship history)
  touches a production database resource for the first time. The admin-exception
  trap fires immediately: admins are expected to have broad access, so "they're
  allowed to" becomes a reflexive resolution. But the detector flagged this
  because admin-user has NEVER touched this specific resource in their entire
  history — not once in 300+ events across 9+ months. An admin legitimately
  working on a resource would have shown prior access; the absence of any
  prior relationship is the signal.

trap_resolved_means: >
  If the model resolves this by reasoning "admin-user is allowed to access
  databases," it conflated permission with pattern. Having the permission to
  access a resource does not explain why an admin who has worked in this
  environment for 9+ months has never accessed this particular resource until
  today. First-access by a deeply-characterized admin is as suspicious as
  first-access by any other actor — the characterization makes the deviation
  more visible, not less concerning.

finding:
  id: fnd_shk_112
  detector: unusual-resource-access
  title: "Unusual resource access: admin-user accessed production database for first time"
  severity: warn
  event_ids: [evt_001, evt_002]
  metadata:
    actor: admin-user
    source: azure
    event_type: database_access

