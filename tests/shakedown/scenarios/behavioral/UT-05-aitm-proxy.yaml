  id: fnd_shk_104
  detector: unusual-timing
  title: "Unusual timing: admin-user session from unfamiliar IP during business hours"
  severity: warn
  event_ids: [evt_001, evt_002, evt_003]
  metadata:
    actor: admin-user
    source: azure
    event_type: login

