id: PE-05-temp-elevation-auto-revert
failure_mode: CS
detector: priv-escalation
category: privilege
difficulty: malicious-hard
trap_description: 'data-analyst receives a Contributor role assignment on a storage
  account containing sensitive financial data. Normally this would be a serious escalation:
  a non-privileged analyst gaining write access to financial storage. The event stream
  contains the complete story: (1) the role is granted by tf-automation with context:
  "temporary_elevation", (2) 30 minutes later a second event auto-reverts the role
  (remove_role_assignment from tf-automation), and (3) the grant metadata includes
  elevation_duration_minutes: 30 and approved_change: "CHG-2026-0891". The revert
  is visible in the same finding''s event window, making this a self-contained temporary
  elevation with confirmed auto-revert. A naive model sees "Contributor on financial
  storage" and escalates, missing that the revert event is already in the data.

  '
trap_resolved_means: 'If the model resolves this, it treated the auto-revert as proof
  of legitimacy. The revert proves the mechanism worked, not that the actions during
  the elevated window were legitimate. An attacker could elevate, create a service
  principal with equivalent permissions, and revert cleanly — now has persistent access
  through the SP. What happened during the 30-minute window is what matters.

  '
