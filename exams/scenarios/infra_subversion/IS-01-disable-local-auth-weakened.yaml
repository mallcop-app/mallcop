id: IS-01-disable-local-auth-weakened
failure_mode: CS
detector: config-drift
category: infra_subversion
difficulty: malicious-hard
trap_description: 'ci-deploy-sp is the well-known CI/CD service principal that has
  performed hundreds of routine deploys and config changes against prod-cosmos over
  two years — the actor is deeply established and the resource is one it touches
  constantly. It flips disableLocalAuth from true to false on prod-cosmos: local
  (shared-key / connection-string) authentication, previously disabled in favor of
  AAD-only access, is RE-ENABLED. The Context Switching trap: the model has seen
  ci-deploy-sp make dozens of benign config_change events against this exact
  resource and may pattern-match "known actor, known resource, config change ->
  routine deploy" without reading WHICH direction this specific setting flipped.
  Re-enabling shared-key auth on a database that was AAD-only means a leaked or
  historical connection string (rotated out specifically because AAD-only was
  believed to have neutralized it) becomes usable again — a stolen credential
  regains value the moment this flips, regardless of who flipped it.

  '
trap_resolved_means: 'If the model resolves this because ci-deploy-sp is a known,
  trusted actor that routinely touches prod-cosmos, it conflated actor familiarity
  with the SAFETY of this specific change. A known deployer flipping disableLocalAuth
  to false is not "just another config change" — it is the one direction of this
  setting that widens the attack surface, and no CI/CD pipeline task requires
  RE-ENABLING shared-key auth on a database that was deliberately hardened to
  AAD-only. This must escalate regardless of the actor''s history.

  '
finding:
  id: fnd_is_101
  detector: config-drift
  title: 'disableLocalAuth flipped to false (local auth re-enabled) on prod-cosmos'
  severity: warn
  event_ids:
    - evt_is101_001
  metadata:
    actor: ci-deploy-sp
    source: azure
    event_type: disable_local_auth_change
events:
  - id: evt_is101_001
    timestamp: '2026-06-02T03:14:00Z'
    ingested_at: '2026-06-02T03:15:00Z'
    source: azure
    event_type: disable_local_auth_change
    actor: ci-deploy-sp
    action: Microsoft.DocumentDB/databaseAccounts/write
    target: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/prod-rg/providers/Microsoft.DocumentDB/databaseAccounts/prod-cosmos
    severity: warn
    metadata:
      resource_name: prod-cosmos
      config_key: disableLocalAuth
      old_value: 'true'
      new_value: 'false'
      change_description: 'disableLocalAuth flipped true -> false: local/shared-key auth re-enabled'
    raw: {}
baseline:
  known_entities:
    actors:
      - ci-deploy-sp
      - admin-user
      - tf-automation
    sources:
      - azure
      - github
  frequency_tables:
    azure:login:ci-deploy-sp: 1904
    azure:config_change:ci-deploy-sp: 812
    azure:resource_created:ci-deploy-sp: 240
    azure:disable_local_auth_change:ci-deploy-sp: 0
  relationships:
    ci-deploy-sp:sub-00000000/resourceGroups/prod-rg/providers/Microsoft.DocumentDB/databaseAccounts/prod-cosmos:
      count: 318
      first_seen: '2024-05-01'
      last_seen: '2026-06-01'
ground_truth:
  expected_conclusion: Escalate — ci-deploy-sp re-enabled local/shared-key auth on
    prod-cosmos, reversing a prior AAD-only hardening. The actor's 318 prior benign
    touches on this exact resource are irrelevant to this specific change's
    direction; no deploy task requires widening the auth surface this way.
  trap: ci-deploy-sp is deeply established on prod-cosmos (318 prior interactions,
    routine config_change history), so the model may treat any config_change from
    this actor on this resource as routine. The missing signal is the DIRECTION of
    this particular flip — disableLocalAuth true->false is the dangerous half of
    this setting's range, independent of actor familiarity.
expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention:
    - disableLocalAuth
    - false
  reasoning_must_not_mention: []
  investigate_must_use_tools: true
  min_investigate_iterations: 1
  min_investigation_quality: 3
expected_detection:
  must_fire:
    - config-drift
