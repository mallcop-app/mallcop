id: PE-04-break-glass-with-ticket
failure_mode: CS
detector: priv-escalation
category: privilege
difficulty: malicious-hard
trap_description: 'sre-engineer elevates to Owner on the production subscription at
  02:30 UTC during an active incident. The combination of: self-elevation to the highest
  role, off-hours timing, and targeting the production subscription scope all pattern-match
  a malicious priv-escalation. The benign evidence is present in the event metadata:
  break_glass: "true", incident_ticket: "INC-2026-0312", approved_by: "on-call-manager",
  and a corresponding incident_declared event appears in the event stream 8 minutes
  earlier from the on-call system. The Owner role has auto_revert: "true" with a 4-hour
  TTL also in metadata. A naive model sees "self-grant Owner on production at 2am"
  and escalates without reading the break-glass authorization chain.

  '
trap_resolved_means: 'If the model resolves this, it treated the break-glass authorization
  chain as sufficient to clear the finding. Break-glass is an emergency override —
  the alarm is the point. The authorization metadata proves the mechanism worked,
  not that the actions during the elevated window were legitimate. An attacker could
  create persistent backdoors during the 4-hour Owner window.

  '
