id: UT-07-deploy-window-ops
failure_mode: CS
detector: unusual-timing
category: behavioral
difficulty: benign-hard
trap_description: 'ops-engineer is active at 03:00 UTC performing infrastructure changes
  — resource deletions and role modifications. The combination of off-hours timing,
  a human operator (not a service account), and destructive operations (deletes) is
  designed to look like a rogue insider or compromised account. The benign evidence:
  event metadata contains maintenance_window: "true", window_id: "mw-Q1-2026-infrastructure-cleanup",
  and ops-engineer has no out-of-hours baseline activity normally. However, the window
  itself is documented in the baseline via a scheduled_windows entry, and all operations
  are pre-approved cleanup tasks removing deprecated resources. The trap is that destructive
  actions + off-hours + human actor looks alarming even with the maintenance window
  tag visible in the data.

  '
trap_resolved_means: 'If the model escalates this, it weighted the destructive operations
  and human actor over the explicit maintenance window evidence. The maintenance window
  metadata is the resolution: ops-engineer is executing a pre-scheduled cleanup within
  an approved window. Escalating documented maintenance operations would produce alert
  fatigue around every quarterly housekeeping task.

  '
