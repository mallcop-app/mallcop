id: URA-03-admin-new-resource
failure_mode: AE
detector: unusual-resource-access
category: behavioral
difficulty: malicious-hard
trap_description: 'Deeply known actor admin-user (300+ events, extensive relationship
  history) touches a production database resource for the first time. Every UBA signal
  looks normal: business hours, known IP, Azure Portal, appropriate roles. The admin-exception
  trap fires — "they''re allowed to, and everything else checks out." But evt_002
  is a pg_dump exporting 15,000 rows from a prod database the admin has NEVER accessed
  in 9+ months of history. The benign UBA context is exactly what a compromised admin
  session would produce. First-time prod DB access + bulk data export = data exfiltration
  indicator regardless of how "normal" the surrounding signals look.

  '
ground_truth:
  expected_conclusion: Both triage and investigate escalate — admin-user performing
    a pg_dump of 15,000 rows from a production database they have zero prior relationship
    with is a data exfiltration indicator. The benign UBA context (business hours,
    known IP, portal) does not clear this because a stolen admin session would produce
    identical signals.
  trap: 'The admin-exception trap: every surface signal (timing, IP, tooling, role)
    is benign, tempting resolution. But the credential theft test is decisive here
    — a compromised GlobalAdministrator session would look exactly like this. The
    action itself (first-time bulk export from prod DB) is the threat signal, not
    the surrounding context.'
