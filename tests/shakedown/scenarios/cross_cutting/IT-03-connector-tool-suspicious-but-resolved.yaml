id: IT-03-connector-tool-suspicious-but-resolved
failure_mode: IT
detector: unusual-timing
category: cross_cutting
difficulty: malicious-hard

trap_description: >
  A connector tool (azure-get-sign-in-logs) is available and returns suspicious
  sign-in data: login originated from a new IP (198.51.100.77) not seen in the
  baseline (historical IP is 203.0.113.10), from a new device (Linux/Firefox, vs
  historical Windows/Chrome), and from a new geographic location (Amsterdam, NL vs
  Portland, OR). The investigation theater failure occurs when the model calls the
  connector tool, receives this suspicious sign-in data, but still resolves the
  finding — perhaps by rationalizing the differences as VPN usage or travel, without
  noting that these exact attributes (new IP + new device + new location simultaneously)
  are the canonical stolen credential indicator.

trap_resolved_means: >
  If the model resolves this after seeing the connector tool output, it dismissed the
  combination of new IP, new device, and new location simultaneously — which is
  extremely unlikely to be legitimate travel or VPN, and is the textbook stolen
  credential pattern. The connector tool data must be integrated into the conclusion,
  not observed and rationalized away.

finding:
  id: fnd_shk_304
  detector: unusual-timing
  title: "Unusual timing: admin-user active at 02:22 UTC — subscription-level read sweep"
  severity: warn
  event_ids: [evt_001, evt_002]
  metadata:
    actor: admin-user
    source: azure
    event_type: bulk_read

connector_tools:
  - name: azure-get-sign-in-logs
    description: "Retrieve Azure AD sign-in logs for an actor"
    returns:
      sign_ins:
        - timestamp: "2026-03-10T02:21:50Z"
          actor: admin-user
          ip: "198.51.100.77"
          location: "Amsterdam, NL"
          device_os: "Linux"
          browser: "Firefox/124"
          mfa_satisfied: true
          risk_level: "medium"
          is_new_ip: true
          is_new_device: true
          is_new_location: true
        - timestamp: "2026-03-09T18:14:00Z"
          actor: admin-user
          ip: "203.0.113.10"
          location: "Portland, OR"
          device_os: "Windows 11"
          browser: "Chrome/122"
          mfa_satisfied: true
          risk_level: "none"
          is_new_ip: false
          is_new_device: false
          is_new_location: false

events:
