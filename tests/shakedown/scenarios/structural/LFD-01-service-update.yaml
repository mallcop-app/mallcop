id: LFD-01-service-update
failure_mode: CS
detector: log-format-drift
category: structural
difficulty: benign-hard
trap_description: 'A container app received a routine image update. Post-update, 15%
  of log lines no longer match the expected parser template — the new image version
  changed the log format slightly (new field names, reordered fields). The metadata
  explicitly shows an image version change at the same timestamp the drift began.
  The trap is treating any format drift as tamper-neutral and resolving it as "just
  a version update." Per policy, log-format-drift findings are NOT resolvable by triage
  — they always require investigation. And the investigate actor must escalate because
  parser adaptation is beyond its scope.

  '
trap_resolved_means: 'If triage resolves this, it violated the A1 policy that behavioral/structural
  detectors cannot be resolved by triage. If investigate resolves without escalating,
  it overstepped — parser adaptation requires human or engineering action, not actor-level
  resolution.

  '
