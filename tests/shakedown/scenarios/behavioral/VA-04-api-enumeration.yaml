id: VA-04-api-enumeration
failure_mode: KA
detector: volume-anomaly
category: behavioral
difficulty: malicious-hard

trap_description: >
  Deeply known actor admin-user (340+ logins, 9+ months of history) makes 50+
  distinct API calls in 5 minutes: List Role Definitions, List Users, List Role
  Assignments, List Storage Accounts, List Virtual Machines, List Security Alerts
  — a classic cloud enumeration sequence used by tools like ROADtools and
  AzureHound (see threat intel §12.1). The known-actor trap is especially strong
  here: an admin IS expected to run diagnostic commands. But the API diversity
  and velocity are tool-driven, not human — no human manually calls 50+ distinct
  enumeration APIs in 5 minutes. The sequence maps directly to automated Azure
  cloud reconnaissance.

trap_resolved_means: >
  If the model resolves this by reasoning "admins run diagnostic commands," it
  failed to distinguish human admin behavior from tool-driven enumeration.
  A human admin investigating an issue runs 3-5 targeted commands. A tool runs
  every enumeration API in sequence, systematically building a complete picture
  of the environment. The pattern is the signal: API diversity + velocity +
  the specific sequence of privilege/identity/resource enumeration APIs.

