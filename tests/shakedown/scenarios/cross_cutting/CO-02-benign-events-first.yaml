id: CO-02-benign-events-first
failure_mode: CO
detector: volume-anomaly
category: cross_cutting
difficulty: malicious-hard

trap_description: >
  Four benign events (normal deploys and health checks) appear first in the event
  list, followed by three suspicious bulk data-read events. A model that anchors on
  the initial benign context may assume the entire session is routine and resolve the
  finding. The volume-anomaly detector fired because of the bulk reads — the prior
  benign events are irrelevant to that determination. The trap is context contamination:
  early benign context bleeds into the evaluation of later suspicious events.

trap_resolved_means: >
  If the model resolves this, it let the benign prefix contaminate its assessment of
  the bulk reads. Each event must be evaluated on its own merits relative to the
  finding. The deploys and health checks do not justify or explain 847 GetObject calls
  on user data buckets. Volume anomalies must be assessed against the baseline, not
  against co-occurring benign activity.

