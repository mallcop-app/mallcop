id: UT-01-competing-signals
failure_mode: CS
detector: unusual-timing
category: behavioral
difficulty: malicious-hard

trap_description: >
  Known actor admin-user is active at 03:14 UTC with a familiar IP address —
  every individual signal looks benign. IP is recognized (203.0.113.10), actor
  is deeply known (340+ logins), and the user_agent is unusual but not inherently
  malicious. The trap is that the model anchors on the familiar IP and known actor
  while failing to notice that the action type (role_assignment) has NEVER appeared
  in the baseline for this actor at this hour. Each signal is explainable; the
  combination is not.

trap_resolved_means: >
  If the model resolves this, it weighted the known-IP and known-actor signals too
  heavily and dismissed the novel action type. Credential theft or session hijacking
  would look identical: familiar IP, known actor name, but the attacker uses the
  stolen session to escalate privileges via role_assignment — an action the real
  admin-user has never taken at 03:00 UTC.

finding:
  id: fnd_shk_100
  detector: unusual-timing
  title: "Unusual timing: admin-user active at 03:14 UTC"
  severity: warn
  event_ids: [evt_001, evt_002]
  metadata:
    actor: admin-user
    source: azure
    event_type: role_assignment

events:
  - id: evt_001
    timestamp: "2026-03-10T03:14:00Z"
    ingested_at: "2026-03-10T03:15:00Z"
    source: azure
    event_type: login
    actor: admin-user
    action: login
    target: acme-corp/tenant
    severity: info
    metadata:
      ip: "203.0.113.10"
      user_agent: "python-requests/2.31.0"
      location: "Portland, OR"
    raw: {}

  - id: evt_002
    timestamp: "2026-03-10T03:16:00Z"
    ingested_at: "2026-03-10T03:17:00Z"
    source: azure
    event_type: role_assignment
    actor: admin-user
    action: add_role_assignment
    target: sub-169efd95/resourceGroups/atom-rg
    severity: warn
    metadata:
      ip: "203.0.113.10"
      user_agent: "python-requests/2.31.0"
      role: "Owner"
      principal_id: "bb99cc11-0001-0002-0003-000000000099"
    raw: {}

baseline:
  known_entities:
    actors: [admin-user, ci-bot, deploy-svc, tf-automation]
    sources: [azure, github]
  frequency_tables:
    "azure:login:admin-user": 340
    "azure:read_resource:admin-user": 89
    "azure:update_config:admin-user": 12
    "azure:login:ci-bot": 1200
    "github:push:ci-bot": 450
  relationships:
    "admin-user:sub-169efd95/resourceGroups/atom-rg":
      count: 45
      first_seen: "2025-06-01"
      last_seen: "2026-03-09"
    "admin-user:sub-169efd95/resourceGroups/rudi-dev":
      count: 28
      first_seen: "2025-07-10"
      last_seen: "2026-03-08"
    "admin-user:acme-corp/tenant":
      count: 340
      first_seen: "2025-05-01"
      last_seen: "2026-03-09"

ground_truth:
  expected_conclusion: "Escalate — admin-user performed a role_assignment at 03:14 UTC using python-requests (not their usual portal user-agent) and the baseline frequency table shows no role_assignment events at this hour; while the IP (203.0.113.10) is familiar, the combination of novel-hour, novel-user-agent, and a role grant to an unknown principal_id is not explained by any benign context in the scenario."
  trap: "The familiar IP and known actor with 340+ logins create strong pressure to resolve each signal individually as benign, but the model must recognize that credential theft preserves the familiar IP while the novel action type (role_assignment at 3am via python-requests) is the actual indicator."

expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention: ["role_assignment", "first time"]
  reasoning_must_not_mention: []
  investigate_must_use_tools: true
  min_investigate_iterations: 2
