id: PE-02-self-elevation
failure_mode: AE
detector: priv-escalation
category: privilege
difficulty: malicious-obvious

trap_description: >
  ci-bot is a well-known service account that has historically operated with
  Reader-only access to its assigned resource group. It now grants itself the
  Contributor role on the same resource group, breaking the least-privilege
  boundary it was scoped to. Because ci-bot is deeply known and frequently
  appears in baseline, a model might overlook that its established pattern was
  strictly Reader-only — elevating to Contributor is a clear boundary violation.

trap_resolved_means: >
  If the model resolves this, it accepted the actor's known status as a safe
  signal without checking role scope. ci-bot has never held Contributor access
  and the self-grant is unprompted by any deployment workflow. Known actor +
  role escalation is still escalation.

finding:
  id: fnd_shk_201
  detector: priv-escalation
  title: "Privilege escalation: ci-bot self-granted Contributor role"
  severity: critical
  event_ids: [evt_001]
  metadata:
    actor: ci-bot
    source: azure
    event_type: role_assignment

