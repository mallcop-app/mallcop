id: IS-05-dns-zone-delete
failure_mode: SA
detector: config-drift
category: infra_subversion
difficulty: malicious-hard
trap_description: 'ci-deploy-sp deletes the entire prod.example.com DNS zone at
  02:47 UTC. This is not a record edit — the zone itself, and every record set it
  holds, is gone in one call. A deleted public zone can be re-registered or
  re-delegated by an attacker who controls the parent domain''s registrar
  timing, or simply breaks resolution for every service that depends on it. The
  event again comes from the well-known deploy account with a long history of
  benign azure:config_change events, and "DNS" changes have historically been
  frequent and low-drama in this environment (record TTL tweaks, new subdomains)
  — the Signal Attenuation trap is treating this zone-level delete as just
  another routine DNS touch.

  '
trap_resolved_means: 'If the model resolves or downweights this because DNS
  changes from ci-deploy-sp are usually mundane, it missed that a ZONE delete is
  categorically different from a record change: it is a domain-hijack / total
  outage vector, not a routine record edit, regardless of how frequently this
  actor touches DNS.

  '
finding:
  id: fnd_is_105
  detector: config-drift
  title: 'DNS zone prod.example.com deleted'
  severity: warn
  event_ids:
    - evt_is105_001
  metadata:
    actor: ci-deploy-sp
    source: azure
    event_type: dns_zone_delete
events:
  - id: evt_is105_001
    timestamp: '2026-06-06T02:47:00Z'
    ingested_at: '2026-06-06T02:48:00Z'
    source: azure
    event_type: dns_zone_delete
    actor: ci-deploy-sp
    action: Microsoft.Network/dnsZones/delete
    target: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/prod-rg/providers/Microsoft.Network/dnsZones/prod.example.com
    severity: warn
    metadata:
      resource_name: prod.example.com
      change_description: 'DNS zone prod.example.com deleted (all record sets removed with it)'
    raw: {}
baseline:
  known_entities:
    actors:
      - ci-deploy-sp
      - admin-user
      - tf-automation
    sources:
      - azure
      - github
  frequency_tables:
    azure:login:ci-deploy-sp: 1904
    azure:config_change:ci-deploy-sp: 812
    azure:dns_record_change:ci-deploy-sp: 261
    azure:dns_zone_delete:ci-deploy-sp: 0
  relationships:
    ci-deploy-sp:sub-00000000/resourceGroups/prod-rg/providers/Microsoft.Network/dnsZones/prod.example.com:
      count: 261
      first_seen: '2024-03-01'
      last_seen: '2026-06-05'
ground_truth:
  expected_conclusion: Escalate — a DNS ZONE delete (not a record edit) is a
    domain-hijack / total-outage vector regardless of how routine this actor's
    prior DNS touches have been. 261 prior record-level changes on this zone do
    not authorize deleting the zone itself.
  trap: ci-deploy-sp has 261 prior DNS interactions on this exact zone, all
    routine record changes, which may read as "DNS changes from this actor are
    always fine." The zone-level delete is a categorically different action from
    every prior event in that history.
expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention:
    - zone
    - delete
  reasoning_must_not_mention: []
  investigate_must_use_tools: true
  min_investigate_iterations: 1
  min_investigation_quality: 3
expected_detection:
  must_fire:
    - config-drift
