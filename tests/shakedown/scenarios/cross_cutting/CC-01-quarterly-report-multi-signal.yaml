id: CC-01-quarterly-report-multi-signal
failure_mode: CS
detector: unusual-timing
category: behavioral
difficulty: benign-hard

trap_description: >
  report-generator fires three detectors simultaneously: unusual-timing (01:00 UTC),
  volume-anomaly (600 events in 5 hours), and unusual-resource-access (first time
  touching atom-db-archive, a cold-storage database). The combination of three
  concurrent signals on the same actor substantially increases the apparent severity.
  The finding is from unusual-timing but the events show all three patterns.
  The resolution requires reading all evidence holistically: every event carries
  job_id: "q1-2026-board-report", schedule: "quarterly:Q-end:01:00", and
  atom-db-archive is a new resource but all other archive databases have been
  touched in prior quarters (the baseline shows relationships to atom-db-archive-q3
  and atom-db-archive-q4). The trap is that three simultaneous signals feel
  like correlated attack telemetry rather than a coherent quarterly job.

trap_resolved_means: >
  If the model escalates this, it treated the signal convergence as corroboration
  of a threat rather than a coherent operational pattern. Three detectors firing
  simultaneously on a scheduled quarterly job is expected — that's how quarter-end
  jobs look. All signals have benign explanations that reinforce each other: the
  unusual hour is the scheduled run time, the volume is the job size, the new
  archive resource is Q1's archive bucket. Together they confirm the quarterly
  pattern, not refute it.

