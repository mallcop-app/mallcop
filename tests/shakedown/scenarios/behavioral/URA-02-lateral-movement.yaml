id: URA-02-lateral-movement
failure_mode: CS
detector: unusual-resource-access
category: behavioral
difficulty: malicious-obvious

trap_description: >
  Known CI service account ci-bot suddenly accesses 5 new resources in sequence:
  a KeyVault, a storage account, a SQL database, a virtual machine, and a container
  registry. ci-bot has a well-established baseline (1200+ logins, deploy operations
  to specific container apps). None of these 5 resources have ever appeared in
  ci-bot's baseline relationships. The lateral movement pattern is a CI/CD account
  being used as a pivot after initial compromise — the account has broad permissions
  but historically touches only its designated deployment targets.

trap_resolved_means: >
  If the model resolves this, it treated ci-bot's established baseline as evidence
  of trust without checking whether the specific resources accessed are within
  its known scope. A well-characterized actor accessing entirely novel resources
  is the definition of lateral movement — the prior characterization makes the
  deviation more detectable, not less concerning.

