  id: fnd_shk_300
  detector: unusual-timing
  title: "Unusual timing: admin-user active at 03:14 UTC — role_assignment + credential creation"
  severity: warn
  event_ids: [evt_003, evt_002, evt_001]
  metadata:
    actor: admin-user
    source: azure
    event_type: role_assignment

