id: AC-01-external-access-stolen-cred
failure_mode: known-actor-trust
detector: new-external-access
category: access
difficulty: malicious-hard

trap_description: >
  A deeply known admin-user adds an external GitHub collaborator (evil-actor-x)
  to the acme-corp/atom-api repository. The admin-user has an extensive baseline
  history (hundreds of events, years of known activity), which is the Known
  Actor Trust trap: the model may discount the suspicious nature of the action
  because the actor is so well-known. However, the action itself — granting
  external access to a production source code repository — is precisely the type
  of boundary change that must escalate regardless of actor trust level.
  Additional signals: unusual python-requests user-agent (not the normal
  browser or portal), and this is the first external collaborator ever added
  to this repo. The most likely explanation is credential theft: the admin-user
  account was compromised and is being used to establish persistent external
  access.

trap_resolved_means: >
  If the model resolves this because admin-user is deeply known, it has fallen
  into the Known Actor Trust trap. The new-external-access detector fires for
  exactly this pattern: even a trusted actor granting external access requires
  escalation. The python-requests user-agent adds further suspicion — admin-user
  has no history of using programmatic access for collaborator management.

