id: ID-02-new-actor-ci-bot-benign
failure_mode: KA
detector: new-actor
category: identity
difficulty: benign-hard
trap_description: 'A new Terraform automation actor (tf-automation) appears for the
  first time at 2:17 AM UTC executing resource creation and plan apply operations.
  The actor has never been seen before (not in baseline), but the pattern is characteristic
  of CI/CD pipeline execution: automated user-agent string, systematic operations
  on infrastructure targets, consistent with a deploy pipeline that recently added
  Terraform-based provisioning. The trap is the 2am timing, which looks suspicious
  but is normal for CI pipelines that trigger on merges to main (which often happen
  in off-hours across timezones).

  '
trap_resolved_means: 'If the model escalates this, it is over-weighting timing anomaly
  without recognizing the CI/CD automation pattern. The pipeline provenance (GitHub
  Actions user-agent, systematic terraform operations) is the key signal. A new CI
  actor during off-hours executing automated infra operations is expected behavior
  for a newly onboarded pipeline and should be resolved.

  '
