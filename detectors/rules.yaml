# detectors/rules.yaml — the DECLARATIVE DETECTOR rules corpus (K6).
#
# This is loop-authored DATA, interpreted by the human-written loader in
# core/detect/declarative.go (LoadRules). Each rule registers one detector
# "decl:<name>" that emits finding family "decl:<name>". A rule can only WIDEN
# detection (add a new family); the K3 guard (core/selfgate) treats this file as
# APPEND-ONLY widen data — an existing rule is frozen (deep-equal), only new rule
# Names may be appended.
#
# Schema (per rule):
#   name:            unique identifier; detector = "decl:<name>"
#   event_types:     optional gate; every entry MUST be a detect.KnownEventTypes
#                    member. Empty => the rule inspects every event.
#   match:
#     kind:          regex | keyword | event_type_present
#     patterns:      regexps (regex) or keywords (keyword); ignored otherwise
#     fields:        dotted payload paths to scan; empty => whole-payload string scan
#   severity:        critical | high | medium | low
#   reason_template: only {actor} {event_type} {match} {rule} are substituted
#   dedup_key:       actor | actor_type | event
#
# The seed is intentionally EMPTY: detection is byte-identical to the pre-K6
# behaviour until the loop proposes its first rule.
rules: []
