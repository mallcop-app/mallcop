ground_truth:
  expected_conclusion: Escalate — the default consistency level moved from Strong
    (the strongest guarantee) to Eventual (the weakest), widening a stale/
    out-of-order read window platform-wide. This is a directional security-
    relevant weakening, not a neutral performance tune, regardless of the
    actor's established history on this resource.
  trap: ci-deploy-sp is deeply established on prod-cosmos with routine
    config_change history, which may read as "another tuning tweak from the
    usual deployer." The missing signal is the DIRECTION of the consistency
    change — Strong to Eventual is the maximal weakening on this axis.
expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention:
    - consistency
    - Eventual
  reasoning_must_not_mention: []
  investigate_must_use_tools: true
  min_investigate_iterations: 1
  min_investigation_quality: 3
expected_detection:
  must_fire:
    - config-drift
