# Vertical-slice chart: GitHub unusual-login detection + triage actor
#
# Pipeline:
#   1. GitHub connector (mallcop-connectors) polls 3dl-dev audit log
#   2. detector-unusual-login compares events against baseline
#   3. For each finding, mallcop-finding-context builds sanitized WorkContext
#   4. Triage worker calls Forge inference to classify + resolve
#   5. Resolution posted to delivery campfire
#
# Boot:
#   we start --chart charts/vertical-slice.toml
#
# Required env vars:
#   GITHUB_APP_ID               — GitHub App ID for 3dl-dev
#   GITHUB_APP_PRIVATE_KEY      — PEM-encoded private key
#   MALLCOP_SERVICE_TOKEN       — mallcop-pro service token for Forge inference
#   MALLCOP_DELIVERY_CAMPFIRE   — delivery campfire ID (default in chart)

[identity]
name        = "mallcop-vertical-slice"
type        = "worker"
description = "Vertical slice — GitHub connector, unusual-login detector, triage actor. Proves the full pipeline end-to-end."
key_file    = "~/.legion/automata/mallcop-vertical-slice/identity.json"

# Schedule worksource: the pipeline is triggered by schedule (periodic scan),
# not by rd work items. The chart polls on interval; each poll runs the full
# connector → detector → triage chain.
[[worksources]]
type = "schedule"

[budget]
max_tokens_per_session = 200000
max_tokens_per_task    = 50000

[autonomy]
max_tasks_per_session = 10

[autonomy.escalation]
# Any finding with severity >= high triggers operator escalation.
scope_keywords = ["critical", "remediate"]

[capabilities]
gate_policy    = "gated"
authority      = "baron@3dl.dev"
tool_allowlist = ["bash", "read", "grep", "glob"]

# --- Seed capabilities ---

# connector-github: run the GitHub connector binary (read-only audit log poll).
[[capabilities.seed]]
name  = "connector-github"
match = ["task:connector"]
tools = ["bash", "read"]
model = "haiku"

# detect-unusual-login: pipe events through the detector binary.
[[capabilities.seed]]
name  = "detect-unusual-login"
match = ["task:detect"]
tools = ["bash", "read"]
model = "haiku"

# triage: call Forge inference to classify and resolve findings.
# Uses sonnet tier — triage decisions require judgment.
[[capabilities.seed]]
name  = "triage"
match = ["task:triage"]
tools = ["bash", "read"]
model = "sonnet"

# investigate: deeper analysis for escalated findings.
# Expanded tool allowlist — still read-only. Uses sonnet tier for judgment.
[[capabilities.seed]]
name  = "investigate"
match = ["task:investigate"]
tools = ["bash", "read", "grep", "web_fetch", "load-skill"]
model = "sonnet"

# heal: dispatches Claude Code to open a PR fixing the structural gap surfaced by
# the finding. Uses spawn-claude-code-fix to fork/branch/PR against an allowlisted
# upstream repo. No direct write tools — all changes go through a draft PR reviewed
# by a human. max_iterations=3: heal reads, classifies, spawns (1 pass each step).
# Schema change: spawn-claude-code-fix added (heal-broaden.md §5, mallcoppro-861).
[[capabilities.seed]]
name           = "heal"
match          = ["task:heal"]
tools          = ["read-finding", "annotate-finding", "resolve-finding", "spawn-claude-code-fix"]
model          = "sonnet"
max_iterations = 3

# deliver: post resolution to the delivery campfire.
[[capabilities.seed]]
name  = "deliver"
match = ["task:deliver"]
tools = ["bash"]
model = "haiku"

# --- Playbook: multi-step actor chain ---
# Defines the ordered actor steps for processing a finding.
# Each step references a capabilities.seed entry by name.
# Budget is shared across all steps in a session (session-wide cap).

[playbook.steps.triage]
# Step 1: classify the finding and decide on initial action.
# If triage emits action=escalate, the pipeline advances to investigate.
seed       = "triage"
routes_to  = "investigate"

[playbook.steps.investigate]
# Step 2: deeper analysis for escalated findings.
# Runs only when triage escalates. Has expanded tool access.
# Budget is shared with triage: investigate starts with (max_session - triage_tokens) remaining.
needs      = ["triage"]
seed       = "investigate"
routes_to  = "heal"
tool_allowlist = ["bash", "read", "grep", "web_fetch", "load-skill", "connector-query:*"]

[playbook.steps.heal]
# Step 3: heal — spawn Claude Code to open a draft PR fixing the structural gap.
# Runs only when investigate escalates. No direct write tools — changes go through
# a draft PR (C4: no gh pr merge authority). Human reviews and merges the PR.
# Budget is shared across all steps: heal starts with (max_session - triage_tokens - investigate_tokens) remaining.
needs          = ["investigate"]
seed           = "heal"
tool_allowlist = ["read-finding", "annotate-finding", "resolve-finding", "spawn-claude-code-fix"]

[lifecycle]
max_workers   = 1
time_limit    = "30m"
poll_interval = "60s"

[inference]
[inference.local_model_mapping]
local = "qwen3-coder-30b"

[agents]
dir = "agents"

[campfire]
transport_dir = "/tmp/campfire"

# --- Pipeline configuration (custom fields read by the pipeline script) ---
# These are not part of the legion chart schema; they are read by the
# pipeline orchestration script that the chart's schedule task executes.

