ground_truth:
  expected_conclusion: Escalate — the event sequence (login → Owner role grant on
    subscription scope → new service principal access key creation → KeyVault secret
    enumeration) within 4 minutes at 03:14 UTC is a textbook post-compromise persistence
    and exfiltration playbook; the baseline shows admin-user has never logged in at
    early morning hours (no early_morning frequency entries) and never on this day's
    time slot.
  trap: The familiar IP (203.0.113.10) and known actor with 487-event baseline create
    strong pressure to resolve, but stolen session tokens preserve the victim's IP
    context — the action sequence is the decisive signal, not the IP.
expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention:
  - access key
  - credential
  reasoning_must_not_mention: []
  investigate_must_use_tools: true
  min_investigate_iterations: 2
  min_investigation_quality: 4
