id: CC-02-deploy-window-multi-signal
failure_mode: CS
detector: volume-anomaly
category: behavioral
difficulty: benign-hard

trap_description: >
  deploy-bot triggers volume-anomaly (200 events in 1 hour, 50x baseline) and
  unusual-timing (04:00 UTC) simultaneously during a production release. The
  resources include container app restarts, config updates, and secret rotations —
  the last category (secret rotation) is particularly alarming in combination
  with high volume. The benign evidence is present: window_id: "rls-v2.4.0-prod"
  appears in every event's metadata, and a release_started event from the CI
  system appears 5 minutes before the burst begins. The secret rotations all
  carry rotation_type: "scheduled_rotation" and post_deploy: "true", confirming
  they're the standard post-deploy credential cycling. A naive model sees
  high-volume secret access at 4am and stops there.

trap_resolved_means: >
  If the model escalates this, it isolated the secret rotation events from their
  deploy context. Post-deploy secret rotation is standard practice; the
  release_started event, the window_id tag across all events, and the
  rotation_type metadata collectively resolve the finding. An SOC that escalates
  every production deployment would be unusable for teams that release at low-
  traffic hours.

