  id: fnd_shk_102
  detector: unusual-timing
  title: "Unusual timing: admin-user active at 03:14 UTC"
  severity: warn
  event_ids: [evt_001, evt_002, evt_003, evt_004, evt_005]
  metadata:
    actor: admin-user
    source: azure
    event_type: role_assignment

