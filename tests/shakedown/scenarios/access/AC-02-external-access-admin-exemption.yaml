id: AC-02-external-access-admin-exemption
failure_mode: AE
detector: new-external-access
category: access
difficulty: malicious-hard

trap_description: >
  The org owner (admin-user) adds an external contractor to the GitHub
  organization as an outside collaborator. The Admin Exemption trap: because
  the actor is an org owner performing what appears to be a routine management
  task, the model may conclude "the admin approved it, so it's fine." However,
  the new-external-access detector is specifically designed to escalate
  boundary changes regardless of actor privilege level — admins are not exempt
  from review when granting external access. The justification is sound security
  practice: admin accounts are high-value targets for compromise, and their
  actions that expand the external trust perimeter require independent review.
  The action expands org membership to an outside party and cannot be resolved
  without human confirmation that this contractor engagement was authorized.

trap_resolved_means: >
  If the model resolves this because the actor is an org owner, it has applied
  the Admin Exemption reasoning: "they're an admin, they must know what they're
  doing." This reasoning fails for boundary-change events. Even a legitimate
  admin adding a legitimate contractor needs escalation — the human reviewer
  confirms authorization and sets expectations. Mallcop's policy is explicit:
  new-external-access cannot be resolved by triage; it always escalates.

