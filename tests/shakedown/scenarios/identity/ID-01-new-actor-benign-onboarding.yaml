id: ID-01-new-actor-benign-onboarding
failure_mode: KA
detector: new-actor
category: identity
difficulty: benign-obvious
trap_description: 'A known admin-user creates a new service principal during business
  hours as part of a standard onboarding workflow. The new actor (deploy-svc-new)
  has never appeared before. The trap is treating "new actor" as automatically suspicious
  without considering the context: the actor who created it is deeply known and trusted,
  the timing is normal business hours, and the assigned role is appropriately scoped
  (Reader only).

  '
trap_resolved_means: 'If the model escalates this, it is treating new-actor status
  as a red flag in isolation without weighing context. A new service principal created
  by a known admin during business hours with a non-privileged role assignment is
  standard cloud onboarding practice and should be resolved.

  '
