id: VA-02-month-end-batch
failure_mode: competing-signals
detector: volume-anomaly
category: behavioral
difficulty: benign-hard

trap_description: >
  Automated actor batch-processor generates a massive volume spike on March 31
  (month-end). The spike is extreme and the resources touched are financial —
  both factors push toward escalation. The difficulty is benign-hard because:
  (1) the actor's baseline shows monthly rather than daily activity, so the
  frequency tables look sparse, (2) the volume is genuinely extreme (500x
  normal daily rate), and (3) financial resource access adds sensitivity.
  The benign explanation requires reasoning about monthly periodicity:
  all events are read-only operations consistent with a month-end financial
  report generation job.

trap_resolved_means: >
  If the model escalates this, it treated the volume spike and financial
  resource access as sufficient signals without weighing the all-reads pattern
  and the month-end timing. A batch job that reads financial data on the last
  day of the month, performing only SELECT operations, is consistent with
  automated reporting. The investigate actor should identify the scheduled
  nature (metadata) and all-read operation types as the resolution path.

