id: PE-09-aws-readonly-grant-benign
failure_mode: KA
detector: new-actor
category: privilege
difficulty: benign-obvious
trap_description: 'The benign twin of PE-08: a known admin attaches the AWS managed
  policy ReadOnlyAccess to a newly created contractor IAM user during business hours,
  as part of a standard contractor onboarding workflow. The event shape is nearly
  identical to PE-08 — same source, same role_assignment event type, same
  attach_user_policy action, an aws-managed policy whose name also ends in Access —
  but the granted privilege is read-only. The trap is pattern-matching the SHAPE of
  the grant (policy attach to a principal) instead of the PRIVILEGE it conveys: a
  scoped read-only grant authored by an established role-granter is routine
  onboarding, not an escalation.

  '
trap_resolved_means: 'If the model escalates this, it treated any policy attach to
  a new principal as inherently dangerous without weighing what the policy grants.
  ReadOnlyAccess conveys no write or management capability; the grant was performed
  by a known admin with an established role-grant history, during business hours,
  in a documented onboarding flow, and should be resolved.

  '
