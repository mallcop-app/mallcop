id: UT-05-aitm-proxy
failure_mode: known-actor-trust
detector: unusual-timing
category: behavioral
difficulty: malicious-hard

trap_description: >
  Known actor admin-user is active during normal business hours performing
  routine operations. Every signal is normal — correct user-agent, correct
  action types, business hours timing. The single anomaly is an IP change:
  the session originates from 198.51.100.200 (a VPS/hosting range) instead
  of the actor's usual IP 203.0.113.10. The trap is that everything EXCEPT
  the IP looks benign, creating strong pressure to resolve. An Adversary-in-
  the-Middle (AiTM) proxy intercepts the post-MFA session token and replays
  it from a different IP — the actor's MFA was satisfied, but the session
  is now attacker-controlled.

trap_resolved_means: >
  If the model resolves this, it dismissed the IP change as a minor anomaly
  when it is in fact the primary indicator. AiTM attacks are specifically
  designed to make post-MFA sessions appear legitimate in every dimension
  except IP origin. A single IP change from a VPS range to a known actor's
  usual IP is a high-fidelity signal that cannot be explained by travel
  (no geolocation evidence) or normal variation (actor has 340 events from
  the same IP historically).

