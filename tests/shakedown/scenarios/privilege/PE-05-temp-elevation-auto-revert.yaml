ground_truth:
  expected_conclusion: Escalate — privilege escalation always requires audit. The
    auto-revert proves the time-bound mechanism worked but does not validate what
    data-analyst did during the 30-minute Contributor window on financial storage.
    An attacker could create persistent access (service principal, API key, data copy)
    during the window and revert cleanly.
  trap: The complete grant-revert cycle with matching change ticket and automation
    context looks like a textbook completed temporary elevation, tempting resolution.
    But the revert is about the mechanism, not the actions — what happened during
    the 30 minutes is unexamined.
