name: Daemon Image
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.daemon'
      - 'scripts/**'
      - 'src/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'Dockerfile.daemon'
      - 'scripts/**'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:
jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (smoke test, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.daemon
          platforms: linux/amd64
          push: false
  build-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.daemon
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mallcop-app/mallcop-daemon:latest
            ghcr.io/mallcop-app/mallcop-daemon:${{ github.sha }}
