baseline:
  known_entities:
    actors: [admin-user, ci-bot, deploy-svc, on-call-manager, sre-engineer, tf-automation]
    sources: [azure, github, incident-system]
    actor_roles:
      sre-engineer: [Contributor, Reader]
      admin-user: [Owner]
      on-call-manager: [Owner, UserAccessAdministrator]
    break_glass_policy:
      enabled: true
      requires_incident_ticket: true
      requires_manager_approval: true
      auto_revert_hours: 4
  frequency_tables:
    "azure:login:sre-engineer": 623
    "azure:role_assignment:sre-engineer": 2
    "azure:resource_list:sre-engineer": 1204
    "azure:config_change:sre-engineer": 89
    "incident-system:incident_declared": 12
  relationships:
    "sre-engineer:sub-169efd95":
      count: 45
      first_seen: "2025-01-15"
      last_seen: "2026-03-12"
    "sre-engineer:sub-169efd95/resourceGroups/atom-rg":
      count: 567
      first_seen: "2025-01-15"
      last_seen: "2026-03-12"

ground_truth:
  expected_conclusion: "Resolve — evt_002 carries break_glass: 'true', incident_ticket: 'INC-2026-0312', and approved_by: 'on-call-manager' metadata; evt_001 (8 minutes earlier) shows the same incident INC-2026-0312 declared by the on-call system with sre-engineer as the assigned responder; the baseline defines a break_glass_policy requiring exactly these fields; auto_revert: 'true' with 4-hour TTL is present."
  trap: "Self-elevation to Owner on the production subscription at 2:30 AM pattern-matches a malicious priv-escalation, causing the model to escalate without reading the complete break-glass authorization chain across both events."

expected:
  chain_action: resolved
  triage_action: resolved
  reasoning_must_mention:
    - "break-glass"
    - "incident"
  reasoning_must_not_mention: []
  investigate_must_use_tools: false
  min_investigate_iterations: 1
