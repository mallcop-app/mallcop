      - github
  frequency_tables:
    azure:login:ci-deploy-sp: 1904
    azure:config_change:ci-deploy-sp: 812
    azure:cosmos_container_create:ci-deploy-sp: 47
    azure:cosmos_container_delete:ci-deploy-sp: 33
  relationships:
    ci-deploy-sp:sub-00000000/resourceGroups/prod-rg/providers/Microsoft.DocumentDB/databaseAccounts/prod-cosmos:
      count: 318
      first_seen: '2024-05-01'
      last_seen: '2026-06-07'
ground_truth:
  expected_conclusion: Escalate — findings-store is the live durable event-store
    backing this deployment's finding/resolution record; deleting it with no
    migration job, no replacement container, and no ticket destroys evidentiary
    history. 33 prior container deletes by this actor do not authorize deleting
    THIS one.
  trap: ci-deploy-sp has deleted 33 containers before as routine lifecycle
    cleanup, which may read as "container deletes from this actor are always
    fine." The missing signal is WHICH container — a scratch/temp container and
    the live event-store are not interchangeable, and nothing in this event
    marks it as a planned migration.
expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention:
    - findings-store
    - delete
  reasoning_must_not_mention: []
  investigate_must_use_tools: true
  min_investigate_iterations: 1
  min_investigation_quality: 3
