id: UT-04-admin-travel
failure_mode: CS
detector: unusual-timing
category: behavioral
difficulty: benign-hard
trap_description: 'Known actor admin-user is active at 14:00 UTC — earlier than their
  normal window of 15:00-23:00 UTC — and from an unfamiliar IP (198.51.100.50) that
  geolocates to London, UK instead of their usual Portland, OR (203.0.113.10). Two
  signals fire: unusual timing and unfamiliar IP. The benign explanation is business
  travel — the actor is working from London, which shifts their local working hours
  to appear early in UTC. The event content is entirely routine (resource reads, config
  check) with no privilege escalation or sensitive resource access.

  '
trap_resolved_means: 'If the model escalates this, it treated the IP change and timing
  shift as sufficient evidence of compromise without weighing the benign explanation:
  the actions are non-sensitive, the timing shift is consistent with the London geolocation,
  and there is no evidence of privilege abuse. A model that cannot reason about travel-induced
  IP and timing changes will generate excessive noise for distributed or traveling
  teams.

  '
