  detector: volume-anomaly
  title: "Volume anomaly: ci-bot performed 500 blob reads in 2 hours (baseline: 10/day)"
  severity: warn
  event_ids: [evt_001, evt_002, evt_003, evt_004, evt_005, evt_006, evt_007, evt_008]
  metadata:
