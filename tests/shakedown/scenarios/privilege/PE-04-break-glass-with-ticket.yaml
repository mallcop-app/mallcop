id: PE-04-break-glass-with-ticket
failure_mode: CS
detector: priv-escalation
category: privilege
difficulty: benign-hard

trap_description: >
  sre-engineer elevates to Owner on the production subscription at 02:30 UTC
  during an active incident. The combination of: self-elevation to the highest
  role, off-hours timing, and targeting the production subscription scope all
  pattern-match a malicious priv-escalation. The benign evidence is present
  in the event metadata: break_glass: "true", incident_ticket: "INC-2026-0312",
  approved_by: "on-call-manager", and a corresponding incident_declared event
  appears in the event stream 8 minutes earlier from the on-call system.
  The Owner role has auto_revert: "true" with a 4-hour TTL also in metadata.
  A naive model sees "self-grant Owner on production at 2am" and escalates
  without reading the break-glass authorization chain.

trap_resolved_means: >
  If the model escalates this, it pattern-matched on the role + scope + timing
  without reading the break-glass authorization context. An active incident
  ticket, manager approval, auto-revert TTL, and same-hour incident declaration
  are collectively the correct break-glass pattern. Escalating every break-glass
  access during live incidents would make the on-call process unworkable.

finding:
  id: fnd_shk_307
  detector: priv-escalation
  title: "Privilege escalation: sre-engineer granted Owner role on production subscription"
  severity: critical
  event_ids: [evt_001, evt_002]
  metadata:
    actor: sre-engineer
    source: azure
    event_type: role_assignment

