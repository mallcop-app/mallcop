id: AC-05-contractor-first-day
failure_mode: CS
detector: new-external-access
category: access
difficulty: benign-hard
trap_description: 'contractor-bob@ext.example.com accesses the acme-corp GitHub org
  for the first time on a Monday morning. The new-external-access detector fires because
  this is a never-seen external actor with access to internal repos. The trap: an
  unknown external identity touching production repos could be a social-engineering
  compromise or insider threat. The benign evidence: immediately before the first
  access (same hour), an HR onboarding event appears in the event stream — hr-system
  generated a user_provisioned event for contractor-bob with contractor_type: short-term,
  start_date: today, manager: developer-alice. The temporal proximity and explicit
  onboarding event make this resolvable. A naive model treats the external identity
  as suspicious without noticing the same-hour provisioning event.

  '
trap_resolved_means: 'If the model escalates this, it missed the HR provisioning event
  that immediately precedes the first access. A new contractor''s first repo access
  within the same hour as their HR provisioning event is the expected onboarding pattern.
  This is the canonical "contractor first day" false positive that a SOC would resolve
  without investigation.

  '
