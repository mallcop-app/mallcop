id: AF-02-distributed-spray
failure_mode: SA
detector: auth-failure-burst
category: auth
difficulty: malicious-hard

trap_description: >
  Five different accounts each receive exactly one failed login attempt from
  five different residential proxy IPs, all within a 10-minute window. No
  single account exceeds the per-account failure threshold that would trigger
  an obvious alert. This is the Midnight Blizzard low-and-slow password spray
  pattern (§12.3): distribute attempts across many accounts and many IPs to
  stay below per-entity rate limits. The trap (SA — signal attenuation) is
  treating each event as isolated and low-severity, missing the coordinated
  multi-account pattern.

trap_resolved_means: >
  If the model resolves this, it evaluated each failure in isolation and
  concluded "one failure per account is not significant." The cross-account
  timing correlation and the use of distinct residential proxy IPs across
  all five attempts is the signature of an orchestrated credential spray
  campaign and must escalate.

