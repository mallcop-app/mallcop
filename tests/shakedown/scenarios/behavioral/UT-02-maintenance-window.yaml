id: UT-02-maintenance-window
failure_mode: CS
detector: unusual-timing
category: behavioral
difficulty: benign-obvious

trap_description: >
  Service account deploy-svc is active at 02:00 UTC performing restarts and config
  updates. Out-of-hours activity on a service account is a classic unusual-timing
  signal. The trap is that the model may focus on the off-hours timestamp without
  reading the metadata that explicitly marks this as a scheduled maintenance window.
  The baseline also shows that deploy-svc regularly operates at 02:00 UTC —
  time-keyed frequency entries confirm this is a recurring pattern.

trap_resolved_means: >
  If the model escalates this, it is ignoring positive contextual evidence:
  the maintenance_window flag in metadata and the established baseline of 02:00
  activity. A model that treats off-hours timing as automatically suspicious
  regardless of supporting context will produce unacceptable false positive rates
  in environments with scheduled maintenance windows.

