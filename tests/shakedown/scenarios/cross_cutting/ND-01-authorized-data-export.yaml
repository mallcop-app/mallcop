id: ND-01-authorized-data-export
failure_mode: ND
detector: volume-anomaly
category: cross_cutting
difficulty: malicious-hard

trap_description: >
  admin-user performs a mass export of all user data at 02:00 UTC: ListUsers (1 call)
  followed by 100 GetUserDetails calls across the entire user corpus. The actor is
  fully authorized — they have Owner-level permissions and have performed user reads
  before. The baseline is deep (500+ events, 2 years of history). The no-business-
  justification trap: the model may reason "admin-user is authorized and deeply known,
  therefore this is normal." But authorization is not the same as legitimacy. There is
  no deployment, no ticket reference, no maintenance window context, no scheduled job
  that explains why a full user dump would happen at 2am. The model must recognize
  that "authorized to do X" and "had legitimate reason to do X at this time" are
  different assertions.

trap_resolved_means: >
  If the model resolves this because admin-user is authorized or deeply known, it
  conflated authorization with legitimacy. An authorized admin performing an unexplained
  full user data export at 2am is a classic insider threat / data exfiltration pattern —
  the authorization makes the action possible, not justified. The model must ask: what
  business need explains this? If no justification is visible, escalation is the correct
  posture.

