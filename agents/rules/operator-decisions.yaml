# operator-decisions.yaml — pre-seeded operator decision corpus
#
# Each rule is sourced from an exam scenario's ground_truth (or
# trap_resolved_means + expected.reasoning_must_mention when the scenario
# uses the legacy schema). The operator_directive captures the resolution
# evidence the operator would cite if asked "why benign?" — it must NOT
# contradict the scenario's expected resolution narrative.
#
# Sourcing (item: mallcoppro-2fc seed + mallcoppro-df1 predicate rewrite):
#   R-001 ← exams/scenarios/behavioral/UT-02-maintenance-window.yaml
#           (ground_truth.expected_conclusion + finding.metadata + events.metadata.maintenance_window)
#   R-002 ← exams/scenarios/behavioral/VA-02-month-end-batch.yaml
#           (trap_resolved_means + events.metadata.scheduled + events.metadata.schedule monthly:last-day)
#   R-003 ← exams/scenarios/auth/AF-01-fat-finger-benign.yaml
#           (ground_truth.expected_conclusion — same-IP + login_success within 2 minutes)
#   R-004 ← exams/scenarios/auth/AF-04-password-reset-resolves.yaml
#           (trap_resolved_means + events.evt_004.event_type=password_reset + evt_005.login_success same IP)
#   R-005 ← exams/scenarios/behavioral/UT-04-admin-travel.yaml
#           (ground_truth.expected_conclusion — London geolocation + UTC shift consistent with travel)
#
# ## Predicate design (mallcoppro-df1 — observable-fields rewrite)
#
# The original 2fc seed used INVENTED predicate keys (`scenario_pattern`,
# `actor_role`, `event_metadata_marker`, etc.) that do NOT appear in any
# scenario's finding or event metadata. The veracity adversary flagged this:
# rules whose predicates can never match are dead corpus. lookup-rules
# returns zero matches, no rule_id is ever cited, and the Phase 2 outcome
# cannot fire.
#
# This rewrite uses ONLY observable fields the worker can pass via
# lookup-rules.finding_metadata. The worker constructs this map from:
#   1. The finding payload it sees in its prompt:
#      finding.metadata = {actor, source, event_type, [volume_ratio,
#      window_hours]} — populated from the scenario YAML's `finding.metadata`
#      block, sanitized through filterAcademyMetadata.
#   2. Discoveries from search-events: any key in events[].metadata is fair
#      game — maintenance_window, scheduled, job_id, schedule, location,
#      usual_location, reset_reason, session_id, etc.
#
# The tool description in capabilities/{triage,investigate}.toml.tmpl already
# instructs the worker to "pass the scenario/finding metadata flags" — this
# rewrite makes that prompt match reality.
#
# Schema (matches mallcoppro-00c loader):
#   rules:
#     - id: "R-XXX"               # unique, R-001..R-NNN
#       applies_to:
#         family: <detector name as it appears on finding.detector>
#         metadata_match:         # predicate over flat finding+events metadata
#           <key>: <value>        # all keys must match (conjunctive, case-insensitive)
#       operator_directive: |     # 1-2 sentences citing the evidence an operator would cite
#         <evidence-grounded resolution rationale>
#
# Schema notes for the loader (00c):
# - `family` matches finding.detector (string equality, case-insensitive).
# - `metadata_match` is a flat map; matching is conjunctive (all keys must match).
# - Values are strings; the loader compares case-insensitively.
# - `operator_directive` is the human-readable directive the chain cites when
#   resolving. Citation plumbing (mallcoppro-49d / E14) reads this field.

rules:
  - id: "R-001"
    applies_to:
      family: "unusual-timing"
      metadata_match:
        # Observable: events[].metadata.maintenance_window = "true" appears
        # on all three UT-02 events. Worker passes this after search-events
        # surfaces the maintenance_window flag.
        maintenance_window: "true"
    operator_directive: |
      Off-hours activity inside a declared maintenance window
      (events carry maintenance_window=true and a matching window_id, and
      the actor has an established baseline at that hour) is non-investigatory;
      resolve with reference to the maintenance window id and baseline frequency.

  - id: "R-002"
    applies_to:
      family: "volume-anomaly"
      metadata_match:
        # Observable: events[].metadata.scheduled = "true" appears on the
        # batch-job events. The worker passes this after search-events surfaces
        # the scheduled flag (and typically the matching job_id). Combined with
        # the volume-anomaly family this matches month-end-batch-style spikes.
        scheduled: "true"
    operator_directive: |
      A volume spike from an actor on a declared schedule
      (events carry scheduled=true with a matching job_id, the schedule
      cadence matches the spike timing, and operations are dominantly
      SELECT/GET with at most a single report-output write) is consistent
      with batch reporting; resolve with reference to the job_id and
      schedule cadence.

  - id: "R-003"
    applies_to:
      family: "auth-failure-burst"
      metadata_match:
        # Observable: the worker reports that search-events surfaced a
        # login_success event for the same actor in the burst window. The
        # worker populates resolution_event="login_success" as a derived
        # observation flag (not present in any single event's metadata —
        # it is a per-finding worker assertion that an event of that type
        # exists in the surfaced events).
        resolution_event: "login_success"
    operator_directive: |
      An auth-failure burst followed within minutes by a login_success from
      the same IP and user-agent is the canonical credential-typo pattern;
      resolve with reference to the same-IP/same-UA continuity and the
      success event timestamp.

  - id: "R-004"
    applies_to:
      family: "auth-failure-burst"
      metadata_match:
        # Observable: the worker reports that search-events surfaced a
        # password_reset event (event_type=password_reset, optionally
        # metadata.reset_reason=forgot_password) followed by a login_success
        # event. The worker populates resolution_event with the two-step
        # signature so this rule distinguishes from the plain fat-finger
        # case (R-003) — the directive specifically cites the password_reset
        # event and the subsequent login_success.
        resolution_event: "password_reset_then_login_success"
    operator_directive: |
      An auth-failure burst followed by a password_reset event and then a
      login_success from the same IP and user-agent is the canonical forgot
      password recovery pattern; resolve with reference to the password_reset
      event and the subsequent same-IP login_success.

  - id: "R-005"
    applies_to:
      family: "unusual-timing"
      metadata_match:
        # Observable: events[].metadata on UT-04's evt_001 carries explicit
        # `location: London, UK` and `usual_location: Portland, OR` fields.
        # When both location and usual_location are present and differ, the
        # worker passes location_change="true" — a derived flag that captures
        # "the events themselves tag this as a known geographic shift". This
        # is what disambiguates travel from genuine credential theft: the
        # source itself attests to a known prior location for the actor.
        location_change: "true"
    operator_directive: |
      A known actor with a timing shift plus an unfamiliar IP that
      geolocates to a city where the new local time matches their normal
      working hours, performing only non-sensitive reads, is consistent with
      business travel; resolve with reference to the geolocation, the local-time
      alignment, and the absence of privilege actions.

  - id: "R-006"
    applies_to:
      family: "new-external-access"
      metadata_match:
        # Sourced from exams/scenarios/access/AC-05-contractor-first-day.yaml.
        # Observable: when search-events surfaces an hr-system event of
        # event_type=user_provisioned for the same target/email AND its
        # metadata carries contractor_email + ticket (HR-*) within the same
        # hour as the external-access finding, the worker passes
        # hr_provisioning="true" — a derived per-finding flag that asserts
        # "an HR onboarding event for this external identity exists in the
        # surfaced events". Same pattern as R-003/R-004's resolution_event
        # flag: a worker-asserted observation grounded in observable event
        # metadata (source=hr-system, event_type=user_provisioned, matching
        # contractor_email / hr_ticket between the HR event and the GitHub
        # org.member_added event).
        hr_provisioning: "true"
    operator_directive: |
      A new external identity whose first access is preceded within the
      same hour by an hr-system user_provisioned event (matching
      contractor_email / hr_ticket linking the HR event to the GitHub
      org.member_added event) is the canonical contractor onboarding
      pattern; resolve with reference to the HR ticket id, the
      provisioning event timestamp, and the contractor's manager of
      record.

  - id: "R-007"
    applies_to:
      family: "new-actor"
      metadata_match:
        # Sourced from exams/scenarios/identity/ID-02-new-actor-ci-bot-benign.yaml.
        # Observable: all three ID-02 events carry
        # metadata.user_agent="terraform-provider-azurerm/3.90.0 (+https://www.terraform.io)"
        # and metadata.correlation_id="tf-run-20260310-0217". When the worker
        # observes a user_agent prefix of "terraform-" (or containing
        # "terraform.io") AND a matching correlation_id like "tf-run-*" across
        # the surfaced events, it passes automation_provenance="terraform" —
        # a derived flag asserting "the events themselves attest to terraform
        # automation provenance". Same pattern as R-003/R-005's derived flags:
        # the predicate is observable in event metadata; the worker just
        # collapses the multi-field signal into a single citation flag.
        automation_provenance: "terraform"
    operator_directive: |
      A new actor whose surfaced events all share a terraform user_agent
      prefix and a single tf-run-* correlation_id, operating on
      infrastructure targets already in a sibling automation actor's
      baseline relationships (ci-bot, deploy-svc on the same resource
      group), is consistent with infrastructure-as-code onboarding;
      resolve with reference to the correlation_id, the terraform user_agent,
      and the sibling-actor baseline on the targets.

  - id: "R-008"
    applies_to:
      family: "volume-anomaly"
      metadata_match:
        # Sourced from exams/scenarios/behavioral/VA-01-deploy-burst.yaml.
        # Observable: events evt_002..evt_005 carry metadata.release="v2.4.0"
        # (and evt_001/evt_002/evt_004 carry metadata.image_tag="v2.4.0").
        # When the worker observes 3+ surfaced events sharing a non-empty
        # release tag (or matching image_tag) on event types from the
        # {image_push, container_deploy, container_restart, health_check}
        # deployment family, it passes deploy_release="true" — a derived
        # flag asserting "the volume spike is composed of deployment
        # operations for a single coherent release". Same pattern as R-002's
        # scheduled flag: a worker-asserted observation grounded in
        # observable event metadata. Distinct from R-002 (scheduled batch)
        # because the spike is release-driven, not cron-driven.
        deploy_release: "true"
    operator_directive: |
      A volume spike from a deployment service account composed entirely
      of deployment-family operations (image_push, container_deploy,
      container_restart, health_check) sharing a single release tag on
      targets already in the actor's baseline relationships is the
      canonical multi-service release pattern; resolve with reference to
      the release tag, the deployment event-type composition, and the
      baseline-known targets.
