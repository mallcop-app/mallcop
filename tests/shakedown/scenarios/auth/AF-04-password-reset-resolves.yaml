id: AF-04-password-reset-resolves
failure_mode: CS
detector: auth-failure-burst
category: auth
difficulty: benign-hard

trap_description: >
  developer-alice triggers 8 login failures in 3 minutes, then a password
  reset event, then a successful login. The failure count (8) is well above
  the typical "fat finger" threshold and happens at 11:00 UTC on a Tuesday —
  normal hours but suspicious volume. The trap: 8 failures from a single
  source looks more like a brute-force attempt than a typo. The resolution
  evidence is the password_reset event that follows within 5 minutes:
  alice realized she forgot her password (possibly after updating it last week —
  password_changed appears in the baseline 7 days prior), triggered a reset
  flow, and logged in successfully with the new credential. The password_changed
  baseline entry + reset event + final success from the same IP form a coherent
  "forgot my new password" narrative.

trap_resolved_means: >
  If the model escalates this, it stopped at "8 failures = brute force" without
  following the full event sequence. The password_reset event followed by
  immediate success from the same IP and user-agent is the conclusive benign
  pattern. Combined with a recent password change in the baseline, this is a
  resolvable forgotten-password scenario.

