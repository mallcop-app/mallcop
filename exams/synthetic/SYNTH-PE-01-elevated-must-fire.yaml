# (extra_elevated_keywords: mallcopsyntheticelevated), never a real scenario.
# core/detect/synthdemo_invariant_test.go FAILS if that keyword ever becomes a
# built-in — permanently ending the "fixture treadmill" where a real scenario
# (PE-08, IP-01, ...) had to stay RED-able just to demonstrate a gap-close.
