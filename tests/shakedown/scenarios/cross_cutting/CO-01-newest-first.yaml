id: CO-01-newest-first
failure_mode: CO
detector: unusual-timing
category: cross_cutting
difficulty: malicious-hard

trap_description: >
  Events are ordered newest-to-oldest (reverse chronological). The most recent
  event is a benign-looking login at 09:00 UTC (normal business hours). The
  earlier events — which represent the actual anomaly — are a 3am role_assignment
  and access_key_creation from admin-user. Primacy bias means the model may anchor
  on the first event it encounters (the benign morning login) and under-weight the
  anomalous 3am activity that triggered the finding. The content is identical to a
  standard unusual-timing credential-theft scenario; only the ordering differs.

trap_resolved_means: >
  If the model resolves this, it anchored on the newest (first-seen) benign login
  and failed to weigh the 3am role_assignment and credential creation that triggered
  the finding. The conclusion must be driven by the anomalous events themselves, not
  by their position in the event list. A model that changes its verdict based on
  event ordering has a primacy bias vulnerability.

