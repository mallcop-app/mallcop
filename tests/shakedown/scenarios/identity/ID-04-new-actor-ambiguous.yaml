id: ID-04-new-actor-ambiguous
failure_mode: KA
detector: new-actor
category: identity
difficulty: ambiguous

trap_description: >
  A new actor (contractor-jsmith) appears and performs a mix of legitimate-
  looking admin tasks alongside one highly suspicious action: accessing a Key
  Vault containing production secrets. The actor has never been seen before.
  Some signals are benign (portal user-agent, single sign-on from corporate
  SSO, normal business hours for some events), but others are concerning (no
  prior relationship to any resource, accessing secrets vault on first day,
  browser-based access to production secrets which is unusual for contractors).
  Neither "clearly malicious" nor "obviously benign" — a genuine judgment call.

trap_resolved_means: >
  If the model resolves this without flagging the secrets access by a brand-new
  unknown actor, it has discounted a legitimate risk signal. When in doubt about
  a new actor touching sensitive resources, the correct action is escalation for
  human review — not resolution. The cost of a false negative (missed intrusion)
  exceeds the cost of a false positive (unnecessary review) for secrets access.

