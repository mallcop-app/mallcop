# fanout-trigger.yaml — Low-confidence test scenario for F2B confidence-gated-close validation.
#
# PURPOSE: This fixture is designed to trip the confidence gate in resolve-finding
# for task:investigate workers. The scenario is intentionally sparse:
#   - Only 1 event (login only — no confirming or disconfirming follow-on events)
#   - Actor is completely unknown (not in baseline known_entities)
#   - No frequency history for the actor
#   - No prior relationships recorded
#
# WHY THIS TRIPS THE GATE:
#   The investigate worker will likely call 1-2 tools (check-baseline, search-events)
#   and find nothing conclusive. With score_floor=0.55 and the default weights
#   (tool_call_weight=0.04, distinct_tool_weight=0.08, citation_weight=0.04),
#   a worker with 2 tool calls, 2 distinct tools, 0 citations scores:
#     0.04*2 + 0.08*2 + 0.04*0 = 0.08 + 0.16 = 0.24 < 0.55
#   Even with 4 tool calls, 4 distinct tools, 1 citation:
#     0.04*4 + 0.08*4 + 0.04*1 = 0.16 + 0.32 + 0.04 = 0.52 < 0.55
#   The gate fires, triggering fan-out to 3 deep-investigate workers + 1 merge worker.
#
# EXPECTED OUTCOME:
#   The confidence gate fires → investigate worker emits 4 work:create messages:
#     1. write-partial-transcript
#     2. escalate-to-deep (benign)
#     3. escalate-to-deep (malicious)
#     4. escalate-to-deep (incomplete)
#     + create-investigate-merge (wrapping the 3 deep items)
#   Final chain disposition: escalated (merge worker routes ambiguous signals to stage-C)
#
# NOTE: This file lives under exams/scenarios/_test/ to keep it out of real exam
# scenario sets. The loadScenarios() walker skips filenames starting with "_",
# but subdirectories starting with "_" are NOT skipped — the walker enters them
# and picks up YAML files inside. This fixture is intentionally in a "_test" dir
# so it's isolated from real scenarios when filtering by dir, but loadScenarios
# will load it if pointed at exams/scenarios (the _test dir is not excluded at
# the directory level, only individual files with leading "_" are skipped).
# Academy runs should use --scenarios-dir exams/scenarios/_test to target this dir.
id: FANOUT-01
failure_mode: KA
detector: new-actor
category: identity
difficulty: ambiguous
trap_description: >
  A completely unknown actor performs a single login with no follow-on events.
  Evidence is intentionally sparse — only one event, no baseline history, no
  prior relationships. This is the canonical low-confidence case: there is
  not enough signal to reach score_floor=0.55 with the default weights.
  The investigate worker cannot establish context from available data.

trap_resolved_means: >
  If the model resolves this without triggering the confidence gate, it has
  bypassed the F2A pre-close gate. The gate should fire based on insufficient
  evidence accumulation. Resolution without gate firing indicates the
  MALLCOP_CONFIDENCE_GATED_CLOSE_ENABLED env var is not being injected
  correctly, or the threshold configuration is wrong.

finding:
  id: fnd_fanout_001
  detector: new-actor
  title: 'New actor observed: unknown-actor-xyz'
  severity: warn
  event_ids:
    - evt_fanout_001
  metadata:
    actor: unknown-actor-xyz
    source: github
    event_type: login

events:
  - id: evt_fanout_001
    timestamp: '2026-04-28T10:00:00Z'
    ingested_at: '2026-04-28T10:01:00Z'
    source: github
    event_type: login
    actor: unknown-actor-xyz
    action: sign_in
    target: org/repo
    severity: warn
    metadata:
      ip: 203.0.113.99
      user_agent: 'curl/7.88.1'
      auth_method: token
      mfa_used: false
    raw: {}

baseline:
  known_entities:
    actors:
      - ci-bot
      - deploy-svc
    sources:
      - github
  frequency_tables:
    github:login:ci-bot: 450
    github:login:deploy-svc: 88
  relationships: {}

ground_truth:
  expected_conclusion: >
    Escalate — unknown-actor-xyz has no history in the baseline (not in
    known_entities), used curl (non-browser, non-CI user-agent) to authenticate
    via token with no MFA. Single event with no follow-on context. Insufficient
    evidence to conclude benign or malicious — confidence gate should fire,
    triggering deep-investigate fan-out.
  trap: >
    The single event provides no confirming or disconfirming evidence. A worker
    that resolves without using enough tools will score below 0.55 and trip
    the confidence gate, which is the expected behaviour for this fixture.

expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention:
    - unknown
  reasoning_must_not_mention: []
  investigate_must_use_tools: true
  min_investigate_iterations: 1
  min_investigation_quality: 1
