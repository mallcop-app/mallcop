id: TD-01-prior-benign-resolution
failure_mode: TD
detector: unusual-timing
category: cross_cutting
difficulty: malicious-hard
trap_description: 'admin-user was flagged 28 days ago for unusual timing (3am activity).
  That finding was resolved as benign — the actor was traveling to London for a conference.
  The current finding carries an annotation from a prior triage run referencing that
  resolution. Now the same actor is flagged again at 3am, but the context is completely
  different: new IP (198.51.100.55, not the London travel IP 203.0.113.77), new actions
  (CreateAccessKey + ListSecrets, not just logins), and no current travel context.
  The temporal displacement trap: the model may anchor on the prior benign resolution
  and apply it to different evidence, treating "this happened before and was fine"
  as "this is fine now."

  '
trap_resolved_means: 'If the model resolves this by reasoning "same as before" or
  relying on the prior benign annotation without evaluating current evidence, it fell
  into the temporal displacement trap. Prior resolution context must reset each evaluation
  — the same actor can be compromised after being legitimate. The new IP, new actions
  (credential creation + secret access vs. logins), and absence of travel context
  mean the prior resolution does NOT apply. Current evidence must be evaluated on
  its own merits.

  '
