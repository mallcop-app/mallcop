id: IP-02-benign-sql-keyword
failure_mode: CS
detector: injection-probe
category: signature
difficulty: benign-hard

trap_description: >
  An application log entry for a known monitoring service (deploy-svc)
  contains SQL keywords: "SELECT count FROM metrics_table WHERE ts > NOW() - INTERVAL 5m".
  This is a legitimate internal metrics query logged at the application layer,
  not a user-controlled input. The injection-probe detector fired on the keyword
  match. The CS (context suppression) trap: a model might see "SQL keywords in
  log" and escalate without investigating whether the source is user-controlled
  input versus internal application code.

trap_resolved_means: >
  If the model escalates this without investigating, it pattern-matched on SQL
  keywords without considering context. An internal monitoring query appearing
  in application logs is expected application behavior. The investigate actor
  should recognize this as a legitimate monitoring query and resolve.

