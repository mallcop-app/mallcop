# operator-decisions.yaml — pre-seeded operator decision corpus
#
# Each rule is sourced from an exam scenario's ground_truth (or
# trap_resolved_means + expected.reasoning_must_mention when the scenario
# uses the legacy schema). The operator_directive captures the resolution
# evidence the operator would cite if asked "why benign?" — it must NOT
# contradict the scenario's expected resolution narrative.
#
# Sourcing (item: mallcoppro-2fc, Wave 3 / Phase 2):
#   R-001 ← exams/scenarios/behavioral/UT-02-maintenance-window.yaml
#           (ground_truth.expected_conclusion + finding.metadata + events.metadata.maintenance_window)
#   R-002 ← exams/scenarios/behavioral/VA-02-month-end-batch.yaml
#           (trap_resolved_means + events.metadata.scheduled + events.metadata.schedule monthly:last-day)
#   R-003 ← exams/scenarios/auth/AF-01-fat-finger-benign.yaml
#           (ground_truth.expected_conclusion — same-IP + login_success within 2 minutes)
#   R-004 ← exams/scenarios/auth/AF-04-password-reset-resolves.yaml
#           (trap_resolved_means + events.evt_004.event_type=password_reset + evt_005.login_success same IP)
#   R-005 ← exams/scenarios/behavioral/UT-04-admin-travel.yaml
#           (ground_truth.expected_conclusion — London geolocation + UTC shift consistent with travel)
#
# Schema (proposed in swarm discovery; mallcoppro-00c is the loader-of-record):
#   rules:
#     - id: "R-XXX"               # unique, R-001..R-NNN
#       applies_to:
#         family: <detector name as it appears on finding.detector>
#         metadata_match:         # predicate over scenario / finding / event metadata
#           <key>: <value>        # all keys must match for the rule to apply
#       operator_directive: |     # 1-2 sentences citing the evidence an operator would cite
#         <evidence-grounded resolution rationale>
#
# Schema notes for the loader (00c):
# - `family` matches finding.detector (string equality).
# - `metadata_match` is a flat map; matching is conjunctive (all keys must match).
#   Values are strings; the loader may extend to typed predicates later.
# - `operator_directive` is the human-readable directive the chain cites when
#   resolving. Citation plumbing (mallcoppro-49d / E14) reads this field.

rules:
  - id: "R-001"
    applies_to:
      family: "unusual-timing"
      metadata_match:
        scenario_pattern: "maintenance-window"
        actor_role: "automation"
        event_metadata_marker: "maintenance_window=true"
    operator_directive: |
      Off-hours activity by an automation actor inside a declared maintenance
      window (events carry maintenance_window=true and a matching window_id, and
      the actor has an established baseline at that hour) is non-investigatory;
      resolve with reference to the maintenance window id and baseline frequency.

  - id: "R-002"
    applies_to:
      family: "volume-anomaly"
      metadata_match:
        scenario_pattern: "scheduled-batch"
        actor_role: "automation"
        event_metadata_marker: "scheduled=true"
        operation_profile: "read-mostly-with-report-output"
    operator_directive: |
      A volume spike from an automation actor on a declared schedule
      (events carry scheduled=true with a matching job_id, the schedule
      cadence matches the spike timing, and operations are dominantly
      SELECT/GET with at most a single report-output write) is consistent
      with batch reporting; resolve with reference to the job_id and
      schedule cadence.

  - id: "R-003"
    applies_to:
      family: "auth-failure-burst"
      metadata_match:
        scenario_pattern: "fat-finger"
        resolution_event: "login_success"
        same_ip_across_burst: "true"
        burst_window: "<=5min"
    operator_directive: |
      An auth-failure burst followed within minutes by a login_success from
      the same IP and user-agent is the canonical credential-typo pattern;
      resolve with reference to the same-IP/same-UA continuity and the
      success event timestamp.

  - id: "R-004"
    applies_to:
      family: "auth-failure-burst"
      metadata_match:
        scenario_pattern: "password-reset-recovery"
        resolution_event: "password_reset_then_login_success"
        same_ip_across_burst: "true"
    operator_directive: |
      An auth-failure burst followed by a password_reset event and then a
      login_success from the same IP and user-agent is the canonical forgot
      password recovery pattern; resolve with reference to the password_reset
      event and the subsequent same-IP login_success.

  - id: "R-005"
    applies_to:
      family: "unusual-timing"
      metadata_match:
        scenario_pattern: "business-travel"
        actor_role: "human"
        coincident_signal: "unfamiliar-ip-geolocation"
        action_profile: "non-sensitive-reads"
    operator_directive: |
      A known human actor with a timing shift plus an unfamiliar IP that
      geolocates to a city where the new local time matches their normal
      working hours, performing only non-sensitive reads, is consistent with
      business travel; resolve with reference to the geolocation, the local-time
      alignment, and the absence of privilege actions.
