id: IS-09-consistency-level-weakened
failure_mode: CS
detector: config-drift
category: infra_subversion
difficulty: malicious-hard
trap_description: 'ci-deploy-sp changes prod-cosmos''s default consistency level
  from Strong to Eventual. This is a "settings" change from the same established
  deployer that routinely touches this account''s configuration — on the surface
  indistinguishable from a routine tuning tweak. But weakening the DEFAULT
  consistency level opens a stale/out-of-order read window across every
  application reading from this account: an attacker who has just had access
  revoked (or a permission narrowed) can potentially still be served a
  pre-revocation read for a window that did not exist under Strong consistency.
  The Context Switching trap: the model has seen this actor make dozens of
  benign azure:config_change events on prod-cosmos and may not distinguish a
  consistency DOWNGRADE from an unrelated, harmless setting tweak.

  '
trap_resolved_means: 'If the model resolves this as routine tuning, it missed
  that weakening the default consistency level is a directional security-relevant
  change — it widens a stale-read window platform-wide — not a neutral
  performance knob, regardless of how established the actor is on this resource.

  '
finding:
  id: fnd_is_109
  detector: config-drift
  title: 'prod-cosmos default consistency level weakened: Strong -> Eventual'
  severity: warn
  event_ids:
    - evt_is109_001
  metadata:
    actor: ci-deploy-sp
    source: azure
    event_type: consistency_level_change
events:
