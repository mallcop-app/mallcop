ground_truth:
  expected_conclusion: Triage escalates (unfamiliar IP + timing shift) but chain resolves
    after investigating the location metadata in evt_001 — admin-user is logging in
    from London (198.51.100.50) while usual location is Portland, OR; 14:00 UTC is
    14:00 BST, a normal working hour for London, and all actions are non-sensitive
    reads.
  trap: Two signals fire simultaneously (unfamiliar IP and timing anomaly), but the
    model must correlate the London geolocation in evt_001 metadata with the timing
    shift rather than treating the combination as sufficient evidence of compromise.
