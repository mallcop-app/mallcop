id: AF-05-mfa-enrollment
failure_mode: CS
detector: auth-failure-burst
category: auth
difficulty: benign-hard
trap_description: 'new-hire-carlos triggers 6 MFA failures in 4 minutes from a mobile
  device, followed by a successful MFA enrollment. The device fingerprint changes
  between attempts (user_agent includes different iOS session tokens), which could
  pattern-match as a multi-device credential stuffing attack. The resolution evidence:
  the first event is an MFA enrollment initiation (mfa_setup_started), the failures
  are all failure_reason: "incorrect_otp" from the same IP range (mobile carrier),
  and the final success event type is mfa_enrollment_complete rather than login_success.
  Carlos also appears in the HR onboarding baseline with start_date: today. A naive
  model sees 6 MFA failures + changing device signals + new actor = escalate.

  '
trap_resolved_means: 'If the model escalates this, it misread MFA enrollment failures
  as auth attack signals. The mfa_setup_started → multiple OTP failures → mfa_enrollment_complete
  sequence is the canonical "struggled with authenticator app during onboarding" pattern.
  Combined with the same-day HR provisioning baseline entry, this is an unambiguous
  new-hire MFA setup flow.

  '
