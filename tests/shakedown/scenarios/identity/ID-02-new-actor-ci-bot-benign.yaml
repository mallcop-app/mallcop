ground_truth:
  expected_conclusion: Triage escalates (new actor at 2am, never seen before). Investigate
    resolves by chasing provenance — all three events share user_agent 'terraform-provider-azurerm/3.90.0'
    and correlation_id tf-run-20260310-0217, the baseline shows existing CI actors
    (ci-bot, deploy-svc) operating on atom-rg, and the automation pattern is consistent
    with infrastructure-as-code onboarding.
  trap: Surface signals (Terraform UA, correlation_id, systematic operations) look
    like obvious CI, tempting triage to resolve without chasing provenance. But a
    new actor at 2am with infrastructure write access needs investigation — an attacker
    could name their tool to look like Terraform automation.
expected:
  chain_action: resolved
  triage_action: escalated
