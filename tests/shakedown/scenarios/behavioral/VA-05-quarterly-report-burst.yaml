id: VA-05-quarterly-report-burst
failure_mode: CS
detector: volume-anomaly
category: behavioral
difficulty: benign-hard

trap_description: >
  report-svc generates 800 events in 6 hours on March 31 — a 400x spike over
  its daily baseline of ~2 events/day. The target resources are financial
  databases and the actor is a service account, both factors that push toward
  escalation. The benign evidence requires reading: (1) every event carries
  job_id: "q1-2026-financial-report" and schedule: "quarterly:Q-end:00:00",
  (2) the event type is exclusively database_read (no writes, no deletes),
  (3) the baseline shows prior quarterly spikes on 2025-12-31 and 2025-09-30
  with identical volume_ratio. A naive model sees a 400x spike touching financial
  data and escalates without checking the periodicity or the job metadata.

trap_resolved_means: >
  If the model escalates this, it failed to reason about quarterly periodicity.
  The baseline explicitly shows prior Q-end bursts with identical volume ratios.
  A read-only service account generating a burst on the last day of the quarter,
  with an explicit quarterly schedule tag and matching historical pattern, is
  a false positive. The SOC should resolve and note the pattern.

finding:
  id: fnd_shk_303
  detector: volume-anomaly
  title: "Volume anomaly: report-svc — 800 events in 6 hours (baseline: 2/day)"
  severity: warn
  event_ids: [evt_001, evt_002, evt_003, evt_004]
  metadata:
    actor: report-svc
    source: azure
    event_type: database_read
    volume_ratio: 400.0
    window_hours: 6

