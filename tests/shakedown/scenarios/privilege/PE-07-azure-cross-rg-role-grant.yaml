id: PE-07-azure-cross-rg-role-grant
failure_mode: CS
detector: priv-escalation
category: privilege
difficulty: malicious-hard
trap_description: 'A known contributor (200+ baseline events, established Contributor
  on atom-rg) grants themselves Contributor on a NEW resource group (mallcop-rg)
  they have never previously accessed. The trap is "they already have Contributor
  elsewhere, so this is just scope expansion." But granting access to an untouched
  resource group may indicate lateral preparation — the actor has zero relationship
  history with mallcop-rg in the baseline, and the role grant is self-directed.
  Context Switching failure: the model conflates existing legitimacy in one scope
  (atom-rg) with legitimacy in a new scope (mallcop-rg), missing the scope-change
  signal.'

trap_resolved_means: 'If the model resolves this, it accepted the scope-expansion
  argument: the actor''s established Contributor status on atom-rg neutralized the
  signal that they are granting themselves Contributor on a resource group they have
  NEVER accessed. Zero baseline relationship with mallcop-rg means this is a first-seen
  actor-scope combination. A known actor self-granting to an untouched scope is the
  textbook lateral-preparation pattern and must escalate.'

