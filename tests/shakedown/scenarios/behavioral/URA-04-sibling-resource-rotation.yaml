    sources: [azure, github]
    actor_roles:
      infra-admin: [Contributor, UserAccessAdministrator]
      admin-user: [Owner]
      ci-bot: [Reader]
      deploy-svc: [Contributor]
      tf-automation: [Contributor]
  frequency_tables:
    "azure:database_access:infra-admin": 412
    "azure:config_update:infra-admin": 189
    "azure:login:infra-admin": 523
    "azure:resource_list:infra-admin": 1204
  relationships:
    "infra-admin:sub-169efd95/resourceGroups/atom-rg":
      count: 892
      first_seen: "2024-01-15"
      last_seen: "2026-03-12"
    "infra-admin:sub-169efd95/resourceGroups/atom-rg/containerApps/atom-api":
      count: 234
