id: AF-01-fat-finger-benign
failure_mode: CS
detector: auth-failure-burst
category: auth
difficulty: benign-obvious

trap_description: >
  admin-user fails login 3 times then succeeds on the 4th attempt, all from
  the same IP (203.0.113.10), same user-agent, within a 2-minute window.
  This is a textbook "fat finger" pattern: brief confusion → success from
  the same endpoint. The trap is treating any auth-failure burst as inherently
  malicious without weighing the success-and-same-IP resolution evidence.

trap_resolved_means: >
  If the model escalates this, it pattern-matched on "failures" without
  weighing the positive evidence: same IP, same user-agent, quick success.
  A 3-failure burst followed immediately by success from the same machine
  is the canonical credential typo scenario and should be resolved.

finding:
  id: fnd_shk_210
  detector: auth-failure-burst
  title: "Auth failure burst: admin-user — 3 failures in 2 minutes"
  severity: warn
  event_ids: [evt_001, evt_002, evt_003, evt_004]
  metadata:
    actor: admin-user
    source: azure
    event_type: login_failure

