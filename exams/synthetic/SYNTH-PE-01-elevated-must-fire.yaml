# CI); the gate tests INJECT it into a throwaway clone's corpus and repin.
#
# The role value "MallcopSyntheticElevatedRole" is a purpose-built nonce: it
# carries NONE of priv-escalation's built-in elevation vocabulary
# (admin/owner/write/contributor/maintainer/editor/fullcontrol), so the detector
# CANNOT fire on it without an explicit tuning knob. Closing this gap therefore
