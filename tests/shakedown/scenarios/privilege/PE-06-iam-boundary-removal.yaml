ground_truth:
  expected_conclusion: Escalate — DeleteRolePermissionsBoundary is a structural IAM
    change that removes a guardrail (DenyPrivilegedActions) from app-role; regardless
    of deploy-svc's known status, this expands the blast radius of app-role and requires
    human review.
  trap: deploy-svc is a known actor with an established IAM change baseline (12 prior
    changes), operates during business hours from a known IP — the model may treat
    this as routine IAM maintenance without recognizing that boundary removal is structurally
    different from routine updates.
