id: PE-08-aws-poweruser-grant
failure_mode: CS
detector: priv-escalation
category: privilege
difficulty: malicious-hard
trap_description: 'A known ops engineer attaches the AWS managed policy PowerUserAccess
  to a service user outside any change window. PowerUserAccess grants full access to
  every AWS service except IAM/Organizations management — it is one of the broadest
  practical privilege grants on the platform — but its name carries none of the
  classic elevation vocabulary ("admin", "owner", "write"), so vocabulary-driven
  reasoning classifies it as an unremarkable role attach. The trap is judging the
  privilege level of a role by whether its NAME sounds privileged instead of by
  what it grants: a PowerUserAccess attach to a service principal with no prior
  grant history is a textbook quiet-escalation vector.

  '
trap_resolved_means: 'If the model resolves this, it judged the grant by the role
  name''s surface vocabulary — PowerUserAccess does not literally say admin/owner,
  so the grant read as routine. The policy is near-omnipotent on the account
  (everything but IAM management); attaching it to a service user with zero
  role-grant precedent is a privilege escalation and must escalate regardless of
  what the role is called.

  '
