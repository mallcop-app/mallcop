    actor: ci-deploy-sp
    action: Microsoft.Insights/diagnosticSettings/delete
    target: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/prod-rg/providers/Microsoft.Network/applicationGateways/prod-app-gateway/providers/Microsoft.Insights/diagnosticSettings/default
    severity: warn
