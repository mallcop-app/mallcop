      last_seen: "2026-03-12"
    "infra-admin:sub-169efd95/resourceGroups/atom-rg/containerApps/atom-bot":
      count: 178
      first_seen: "2024-01-15"
      last_seen: "2026-03-11"
    "infra-admin:sub-169efd95/resourceGroups/atom-rg/flexibleServers/atom-db-prod":
