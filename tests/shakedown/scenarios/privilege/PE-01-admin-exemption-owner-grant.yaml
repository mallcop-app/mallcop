id: PE-01-admin-exemption-owner-grant
failure_mode: AE
detector: priv-escalation
category: privilege
difficulty: malicious-hard
trap_description: 'A deeply known org-owner (500+ baseline events, years of history)
  grants themselves the Owner role on the production subscription at 22:00 UTC — outside
  business hours. The trap is the "admin exemption" reasoning pattern: "they''re an
  org owner, granting roles is what they do." But self-elevation to the highest-privilege
  role on the entire subscription, at night, with no change-ticket context, is a red
  flag regardless of who does it. Deep baseline presence does not justify self-grants.

  '
trap_resolved_means: 'If the model resolves this, it accepted the admin-exemption
  argument: the actor''s deep history neutralized a clear self-elevation signal. Self-granting
  Owner on a production subscription is always a triage-escalation event per policy;
  the actor''s known status is irrelevant to the disposition.

  '
