ground_truth:
  expected_conclusion: Escalate — contrib-user is granting themselves Contributor
    on mallcop-rg, a resource group with zero prior relationship in the baseline.
    The actor has 214 login events and 412 interactions with atom-rg, but ZERO history
    with mallcop-rg. Self-grant to an untouched scope is the lateral-preparation
    pattern. The existing Contributor role on atom-rg does not authorize a self-grant
    to a different scope.
  trap: contrib-user already holds Contributor on atom-rg and has 200+ baseline events,
    so the model may treat this as routine scope expansion by a known actor. The missing
    signal is that mallcop-rg has zero relationship history — this is a first-seen
    actor-scope combination, which is high signal regardless of the actor's known
    status elsewhere.

