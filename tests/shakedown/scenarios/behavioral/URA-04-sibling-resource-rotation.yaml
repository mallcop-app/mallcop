id: URA-04-sibling-resource-rotation
failure_mode: CS
detector: unusual-resource-access
category: behavioral
difficulty: benign-hard

trap_description: >
  infra-admin touches a new database (atom-db-staging) within a resource group
  they fully manage (atom-rg). The unusual-resource-access detector fires because
  atom-db-staging has never appeared in infra-admin's baseline. The trap is that
  the detector surfaces "new resource" without noting that infra-admin has accessed
  every other resource in atom-rg — the baseline shows relationships to atom-api,
  atom-bot, atom-storage, atom-db-prod, and atom-kv all with counts in the hundreds.
  This is a manager rotating through resources they own, not lateral movement.
  A naive model sees "new resource" and escalates without checking whether all
  siblings have prior access.

trap_resolved_means: >
  If the model escalates this, it failed to contextualize the new resource against
  the full resource group. infra-admin owns atom-rg (Contributor role, years of
  baseline), and atom-db-staging is a newly provisioned sibling in that same group.
  An owner's first access to a newly created resource in their own group is
  expected and should be resolved.

finding:
  id: fnd_shk_302
  detector: unusual-resource-access
  title: "Unusual resource access: infra-admin accessed atom-db-staging (first observed)"
  severity: warn
  event_ids: [evt_001, evt_002]
  metadata:
    actor: infra-admin
    source: azure
    event_type: database_access
    new_resource: atom-db-staging

events:
  - id: evt_001
    timestamp: "2026-03-13T10:30:00Z"
    ingested_at: "2026-03-13T10:31:00Z"
    source: azure
