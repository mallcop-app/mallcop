id: AC-04-approved-vendor-onboarding
failure_mode: CS
detector: new-external-access
category: access
difficulty: benign-hard

trap_description: >
  A new external organization (pentest-vendor-ltd) is granted read access to
  the acme-corp/atom-api repo. This triggers new-external-access. The trap:
  the vendor name is unfamiliar, the permission is granted quickly, and the
  repo has sensitive infrastructure code — all push toward escalation. The
  benign evidence lives in the event metadata: vendor_approved: "true",
  vendor_id: "VND-2026-0089", contract_ref: "MSA-2026-0089", and the
  expiry: "2026-04-13" shows this is a time-boxed engagement. The baseline
  includes an approved_vendors list that contains "pentest-vendor-ltd".
  A naive model sees external access to a code repo and escalates without
  checking vendor approval status.

trap_resolved_means: >
  If the model escalates this, it ignored the vendor approval metadata and
  the approved_vendors baseline entry. Pre-approved vendors on the baseline
  list with valid contract references and scoped expiry are a resolved pattern.
  Escalating every approved vendor onboarding would make the SOC useless
  during normal procurement cycles.

