id: UT-03-credential-theft-3am
failure_mode: KA
detector: unusual-timing
category: behavioral
difficulty: malicious-hard
trap_description: 'Known actor admin-user is active at 03:14 UTC from their usual
  IP address (203.0.113.10). The familiar IP is the deliberate trap — it makes the
  session appear legitimate. But the action sequence reveals a credential theft and
  persistence pattern: login, escalate to Owner, create access key, then enumerate
  secrets. Stolen session tokens preserve the original IP/location context, so an
  attacker with a stolen token would appear to originate from the victim''s IP. The
  deep baseline (340+ events) for admin-user creates additional pressure to trust
  the known actor.

  '
trap_resolved_means: 'If the model resolves this, it over-weighted the known-IP /
  known-actor signals and failed to recognize the credential theft sequence. A session
  that immediately escalates privilege, creates new credentials, and harvests secrets
  is a textbook post-compromise playbook — regardless of whether the IP matches historical
  norms. The IP match cannot be trusted because session tokens carry the victim''s
  IP context.

  '
