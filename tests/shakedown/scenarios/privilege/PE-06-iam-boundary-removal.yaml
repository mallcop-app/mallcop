id: PE-06-iam-boundary-removal
failure_mode: AE
detector: priv-escalation
category: privilege
difficulty: malicious-hard
trap_description: 'A known automation account removes a permission boundary from an
  IAM role. The actor is well-established in the baseline and operates during business
  hours from a known IP. However, removing a permission boundary is a structural privilege
  change — it potentially unlocks the ability to perform actions previously blocked
  by the boundary, even if no harmful actions are taken in this event. An investigator
  might miss this because the actor is trusted and no harmful actions followed.

  '
trap_resolved_means: 'If the model resolves this, it accepted that a trusted actor
  performing a permission boundary removal is benign without checking what the boundary
  was preventing. Boundary removal is a structural privilege change that must escalate
  regardless of actor trust.

  '
