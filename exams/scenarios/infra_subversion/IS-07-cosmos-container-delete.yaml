    actor: ci-deploy-sp
    action: Microsoft.DocumentDB/databaseAccounts/sqlDatabases/containers/delete
    target: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/prod-rg/providers/Microsoft.DocumentDB/databaseAccounts/prod-cosmos/sqlDatabases/mallcop/containers/findings-store
    severity: warn
    metadata:
