id: UT-06-timezone-change
failure_mode: CS
detector: unusual-timing
category: behavioral
difficulty: benign-hard
trap_description: 'developer-alice is active at 07:00 UTC — unusual compared to her
  baseline, which shows activity clustered 15:00–22:00 UTC (US Pacific working hours).
  The trap: the hour looks like a pre-dawn session for someone on Pacific time, which
  could mean session hijacking or credential theft. The benign explanation requires
  reading the metadata: alice''s location recently changed to "London" (event metadata
  includes location: London), and 07:00 UTC is 07:00 BST — normal morning working
  hours for a UK-based employee. The baseline also shows a location change event two
  weeks prior. A naive model anchors on the old timezone pattern and escalates.

  '
trap_resolved_means: 'If the model escalates this, it ignored the location change
  evidence in the events and baseline. alice relocated to London two weeks ago; her
  new working hours (07:00–16:00 UTC) are entirely consistent with that. Treating
  a timezone-shifted employee''s normal morning work as suspicious after a confirmed
  location change produces chronic false positives for globally mobile employees.

  '
