ground_truth:
  expected_conclusion: Escalate — a standalone diagnostic-settings delete on
    prod-app-gateway, unaccompanied by any deploy/IaC context, blinds the resource's
    own audit trail. This must escalate even though ci-deploy-sp is an established
    deployer on this resource.
  trap: The delete targets a "settings" object, not the resource itself, and comes
    from a well-known deploy account — surface features that make it read as minor
    cleanup. The actual effect (this resource's activity stops being logged) is
    audit-blinding regardless of how administrative the action looks.
expected:
  chain_action: escalated
  triage_action: escalated
  reasoning_must_mention:
