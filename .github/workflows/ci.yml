name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Doc-test harness (mallcoppro-cec) — every README/docs terminal demo vs the real binary
        run: go test -tags docdemo -count=1 -v ./test/docdemo/...

      - name: E2E harness (mallcoppro-8ac) — the built binary against a canned inference backend, consensus ON
        # cli/scan_e2e_test.go is //go:build e2e — it never runs under the bare
        # `go test ./...` above, so it was silently skipped by CI until this step.
        # Offline/deterministic: cannedbackend is an in-process fake
        # Anthropic-compatible server (no network, no real credentials, no cost),
        # so this runs unconditionally on every push/PR, not gated behind
        # secrets. It builds the real cmd/mallcop binary and drives it through
        # `mallcop scan` end to end with the production consensus gate on
        # (scan.go's agent.DefaultConsensusRuns=3 — not overridden by the test).
        run: go test -tags e2e -count=1 -v ./cli/...

      - name: Vet
        run: go vet ./...
