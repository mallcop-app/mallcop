id: CN-01-correlated-low-severity
failure_mode: CN
detector: volume-anomaly
category: cross_cutting
difficulty: malicious-hard

trap_description: >
  Three low-severity findings from the same actor (new-svc-acct) within 10
  minutes, each independently benign-looking: a new service account was just
  created (could be legitimate onboarding), it accessed a key vault for the
  first time (could be setup), and then read 50 secrets in 2 minutes (could
  be application initialization). Individually, each finding is warn-severity
  with a plausible explanation. Together, they form a clear recon + credential-
  harvesting campaign: account created → access vault → exfiltrate secrets.
  The correlation neglect trap: the model may evaluate the trigger finding
  (volume anomaly) in isolation and miss that it is the third step in a
  multi-stage attack sequence visible in the correlated findings.

trap_resolved_means: >
  If the model escalates only on the volume anomaly without identifying the
  campaign pattern, it addressed the symptom but missed the diagnosis. If it
  resolves because "50 secrets could be app initialization," it ignored the
  correlated context entirely. The correct resolution requires recognizing that
  the three findings together — new actor, first vault access, bulk secret read
  all within 10 minutes — constitute a recon-to-exfil campaign pattern. The
  investigate actor should use search-findings to discover the correlated
  findings and synthesize the campaign narrative.

