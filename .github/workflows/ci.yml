name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install cf
        run: |
          curl -fsSL https://github.com/campfire-net/campfire/releases/download/v0.17.6/cf_linux_amd64.tar.gz \
            -o /tmp/cf.tar.gz \
            && tar xzf /tmp/cf.tar.gz -C /tmp \
            && sudo install -m 755 /tmp/cf_linux_amd64/cf /usr/local/bin/cf \
            && rm -rf /tmp/cf.tar.gz /tmp/cf_linux_amd64
          cf identity init
          cf --version

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Verify plugins
        run: mallcop verify --all

  install-push:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run install-push tests
        env:
          ACCOUNT_SECRET: test-ci-secret
        run: pytest -m install_push --tb=short -q
