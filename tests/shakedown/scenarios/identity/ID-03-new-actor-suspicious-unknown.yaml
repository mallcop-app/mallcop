id: ID-03-new-actor-suspicious-unknown
failure_mode: KA
detector: new-actor
category: identity
difficulty: malicious-obvious
trap_description: 'A completely unknown actor (ext-user-7f3a) from an IP address outside
  any known range performs classic cloud enumeration: listing resources, then probing
  for secrets. The actor has no baseline presence, no known relationship to any resource,
  uses a generic Python requests user-agent (common in automated attack tooling),
  and the operation sequence (ListResources followed by GetSecrets) is a textbook
  enumeration pattern. There is no benign interpretation for this combination of signals.

  '
trap_resolved_means: 'If the model resolves this, it has treated "no history" as neutral
  rather than suspicious in the context of an enumeration pattern from an unknown
  IP. An unknown actor performing resource enumeration followed by secrets access
  is a high-confidence attack indicator and must escalate.

  '
