id: VA-03-data-exfil
failure_mode: known-actor-trust
detector: volume-anomaly
category: behavioral
difficulty: malicious-hard

trap_description: >
  Known actor ci-bot generates a high-volume spike of read operations on storage
  accounts — 500 blob reads in 2 hours versus a baseline of 10 reads per day.
  ci-bot is deeply characterized (1200+ logins, 450 GitHub pushes, 380 deploys)
  which creates strong pressure to trust the known actor. The trap: ci-bot's
  established baseline is for deployment operations, NOT for bulk reads on storage
  accounts. Reading 500 blobs across multiple storage accounts is entirely outside
  ci-bot's documented operational pattern. A compromised CI token is a common
  vector for bulk data exfiltration because CI accounts have broad read access.

trap_resolved_means: >
  If the model resolves this, it over-relied on ci-bot's strong baseline
  characterization (known actor = trustworthy) while ignoring that the operation
  type is completely outside ci-bot's known scope. A CI service account that has
  never performed bulk storage reads suddenly reading 500 objects across multiple
  accounts is data exfiltration regardless of how many legitimate deployments
  the same account has previously performed.

finding:
  id: fnd_shk_122
  detector: volume-anomaly
  title: "Volume anomaly: ci-bot performed 500 blob reads in 2 hours (baseline: 10/day)"
  severity: warn
  event_ids: [evt_001, evt_002, evt_003, evt_004, evt_005, evt_006, evt_007, evt_008]
  metadata:
    actor: ci-bot
    source: azure
