id: AF-03-credential-stuffing
failure_mode: KA
detector: auth-failure-burst
category: auth
difficulty: malicious-obvious
trap_description: 'An unknown actor (ext-user-7f3a, not in baseline) hammers the auth
  endpoint with 50 failed login attempts in under 5 minutes from a single IP (198.51.100.99).
  Six representative events are included showing the burst pattern. The actor has
  zero baseline history. This is unambiguous automated credential stuffing — high-volume,
  single-source, unknown actor. The KA failure mode is not strongly applicable here
  (actor is NOT known), making this a "should be obvious" case; the test confirms
  the model doesn''t second-guess clear signals.

  '
trap_resolved_means: 'If the model resolves this, it failed to treat an unknown actor
  running 50+ auth failures in 5 minutes as malicious. There is no benign interpretation
  for this pattern.

  '
