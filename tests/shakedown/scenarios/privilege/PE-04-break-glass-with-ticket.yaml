ground_truth:
  expected_conclusion: Escalate — privilege escalation always requires audit regardless
    of authorization chain. Break-glass is by definition an emergency override that
    triggers review. The break-glass metadata, incident ticket, and auto-revert prove
    the mechanism worked, but do not validate what was done with Owner access during
    the elevated window. An attacker with sre-engineer credentials could create persistent
    backdoors (service principals, API keys) during the 4-hour window and revert cleanly.
  trap: The break-glass authorization chain (incident ticket, manager approval, auto-revert
    TTL) looks like a complete justification for resolution, but privilege changes
    always need audit — the mechanism working correctly does not mean the actions
    taken were legitimate.
