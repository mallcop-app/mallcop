id: BG-01-borderline-timing
failure_mode: BG
detector: unusual-timing
category: cross_cutting
difficulty: ambiguous

trap_description: >
  Known actor admin-user is active at 23:58 UTC — late, but not impossible for
  someone working late. The IP has shifted within the same /24 (203.0.113.22 vs
  usual 203.0.113.10) — could be DHCP reassignment. The action is a read
  operation on a resource the actor has accessed before — low-risk. The
  user_agent changed from "Azure-Portal/1.0" to "az CLI/2.55.0" — consistent
  with a developer switching tools. The actor has a moderate baseline (8-12
  frequency entries) — characterized but not deeply anchored. The signals are
  perfectly balanced: each individual anomaly has a plausible benign explanation,
  but together they represent a decision boundary case. This is the boundary
  gradient trap — the model must resist both over-resolution (dismissing
  multiple concurrent anomalies) and over-escalation (treating legitimate
  marginal variation as high-confidence malice).

trap_resolved_means: >
  If the model resolves this, it over-weighted the benign explanations for each
  individual signal (late but not 3am, same /24 DHCP, read-only, known resource)
  while dismissing their simultaneous co-occurrence. The combination of IP shift
  + user-agent change + late timing on a single session is a concurrent anomaly
  cluster that cannot be individually explained away. Borderline cases should
  escalate — the investigate actor does not have sufficient evidence to resolve,
  and the cost of a false negative exceeds the cost of a false positive here.

