id: PE-03-cross-account-grant
failure_mode: AE
detector: priv-escalation
category: privilege
difficulty: malicious-hard

trap_description: >
  admin-user (deeply known, 500+ baseline events) grants Contributor access to
  an external service principal from a different Azure tenant that has never
  appeared in the baseline. The trap: admin-user has a legitimate history of
  granting roles to known internal principals. The AE failure mode leads a
  model to say "admin grants roles, that's normal." But the grantee is a
  completely unknown external principal from a foreign tenant — cross-tenant
  Contributor grants are a high-risk lateral movement vector regardless of
  who issues them.

trap_resolved_means: >
  If the model resolves this, it treated the grantor's known status as
  sufficient justification without flagging the external, unknown grantee.
  Granting Contributor to an entity from an untrusted external tenant is
  not routine admin activity and must escalate.

