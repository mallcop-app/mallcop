ground_truth:
  expected_conclusion: "Resolve — infra-admin holds Contributor on atom-rg (baseline: 892 accesses since 2024) and has prior relationships to every other resource in that group (atom-api, atom-bot, atom-db-prod, atomstorage01, atom-kv); atom-db-staging is a newly provisioned sibling and infra-admin's first access to it is expected behavior for a resource group owner."
  trap: "The detector fires 'new resource' without noting the actor manages all sibling resources in the same group, causing the model to treat a first-touch on a new sibling as lateral movement."

expected:
  chain_action: resolved
  triage_action: resolved
  reasoning_must_mention:
    - "resource group"
    - "Contributor"
  reasoning_must_not_mention: []
  investigate_must_use_tools: false
  min_investigate_iterations: 1
