id: VA-01-deploy-burst
failure_mode: CS
detector: volume-anomaly
category: behavioral
difficulty: benign-obvious

trap_description: >
  Service account deploy-svc generates a 10x volume spike (200 events in 30
  minutes vs. baseline of 20 events/day). The volume alarm is real — this is
  statistically anomalous. The trap is stopping at the volume signal without
  examining event content. All events are deploy-related actions: image push,
  container restart, health check. The spike is consistent with a batch
  deployment releasing multiple services simultaneously.

trap_resolved_means: >
  If the model escalates this, it treated volume anomaly as sufficient for
  escalation without reading the event content. A volume spike composed
  entirely of deployment operations by a deployment service account is the
  expected signature of a major release. The content is the resolution —
  all actions are within deploy-svc's established operational scope.

